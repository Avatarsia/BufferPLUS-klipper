#####################################################################
#   Mellow LLL Plus Filament Buffer — Klipper Config (Python-Ansatz)
#####################################################################
#
# Diese Config gehört zur Python-Extension-Architektur (Variante 3).
# Der Feeder-Stepper wird ausschließlich von [buffer_feeder mellow]
# in klippy/extras/buffer_feeder.py verwaltet. KEIN SYNC_EXTRUDER_MOTION,
# KEIN FORCE_MOVE während des Drucks — der Feeder fährt auf seiner
# eigenen trapq, vollständig entkoppelt vom Haupt-Motion-Planner.
#
# Installation:
#   ./install.sh     (im Repo-Root auf dem Host ausführen)
# Danach diese Datei per `[include lll.cfg]` in printer.cfg einbinden.
#
# Voraussetzungen in printer.cfg:
#   [pause_resume]
#   [extruder]
#   max_extrude_only_distance: 200   # mindestens so groß wie load_slow_distance
#
# Anpassen nach Kalibrierung (siehe README):
#   • rotation_distance im [buffer_feeder mellow]-Block
#   • load_fast_distance (MEASURE_LOAD_START benutzen)
#   • load_slow_distance (Heatbreak+Nozzle-Länge)
#   • unload_sync_distance (≥ load_slow_distance)
#####################################################################


[mcu LLL_PLUS]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_2D001E001457464E33313420-if00
restart_method: command


#####################################################################
#   Buffer-Feeder — Python-Extension (verwaltet den kompletten Feeder)
#####################################################################

[buffer_feeder mellow]
# --- Hardware: Stepper ---
step_pin: LLL_PLUS:PC13
dir_pin: LLL_PLUS:PA7
enable_pin: !LLL_PLUS:PA6
microsteps: 16
gear_ratio: 50:17
rotation_distance: 18.86          # 1:1-kalibriert (aus Phase 2)

# --- Hardware: Sensoren ---
# Pin-Convention (wie im alten [gcode_button]-Config):
#   ^! = Pullup + Invert. Die Mellow LLL Plus benutzt eine Arm-Mechanik;
#   ein einzelner schwenkbarer Arm blockiert je nach Fuellstand DEN
#   entsprechenden Photo-Interrupter (HALL3 bei leer, HALL2 bei voll,
#   HALL1 bei Ueberlauf). Sensor-geblockt = Pin-HIGH via Pullup (weil
#   Transistor OFF). Klipper-Invertierung via `!` bildet Pin-HIGH auf
#   callback-state=False ab. Die Extension kehrt dann einmal um
#   (polarity_flip=True) fuer die Semantik "Schwelle aktiv = True".
#   Das ist KEIN doppelter Invert - ^! + not() kombinieren zu einer
#   klaren Semantik: True = Sensor aktiv (= Arm blockiert).
hall_empty_pin:      ^!LLL_PLUS:PB4      # HALL3 unten  = Buffer leer
hall_full_pin:       ^!LLL_PLUS:PB3      # HALL2 oben   = Buffer voll
hall_overflow_pin:   ^!LLL_PLUS:PB2      # HALL1 ganz oben = Überlauf
# Entrance-Microswitch schließt bei Filament, ^! liefert state=True
# wenn Filament präsent (standard-Pattern fuer filament_switch_sensor).
entrance_pin:        ^!LLL_PLUS:PB7      # Filament am Buffer-Eingang

# --- Hardware: Taster ---
# Taster: Druck zieht auf GND, ^! liefert state=True bei Druck.
feed_button_pin:     ^!LLL_PLUS:PB12
retract_button_pin:  ^!LLL_PLUS:PB13

# --- Geschwindigkeiten ---
feed_speed:         30            # mm/s — Bang-Bang Auto-Refill
manual_speed:       15            # mm/s — Taster Dauerlauf
burst_speed:        50            # mm/s — Triple-Click Burst
load_fast_speed:    50            # mm/s — LOAD Phase 1+3
load_slow_speed:     5            # mm/s — LOAD Phase 2 (parallel zum Extruder)
unload_fast_speed:  50            # mm/s — UNLOAD Phase 3
grip_speed:         55            # mm/s — Initial-Grip
accel:            1000            # mm/s²

# --- Distanzen / Dauern ---
manual_chunk_distance: 10         # mm — 2-Klick-Puls
burst_distance:      1300         # mm — Retract-Triple-Burst
grip_duration:         10         # s  — Initial-Grip-Dauer (→ ~550mm @ 55mm/s)
load_fast_distance:  1000         # mm — LOAD Phase 1 (kalibriert via MEASURE_LOAD_START)
load_slow_distance:   180         # mm — LOAD Phase 2 (Heatbreak-Durchgang)
load_buffer_max:     2000         # mm — LOAD Phase 3 Timeout bis HALL2
unload_sync_distance: 180         # mm — UNLOAD Phase 2 (synchron zurück)
unload_fast_max:     2510         # mm — UNLOAD Phase 3 Max (Polling)

# --- Safety ---
max_feed_time:       60           # s — Max Dauerfeed ohne HALL2-Trigger
max_feed_distance: 3000           # mm — alternative Safety-Grenze
hall_debounce_ms:    50           # ms — Sensor-Debounce
lead_time:           0.3          # s — MCU-Move-Scheduling-Lead

# --- Jam-Detection ---
jam_detection_enabled: 1
jam_clog_dwell_time:   60         # s — HALL2-Max-Verweil bei aktiver Extrusion
jam_clog_extrude_min:  30         # mm — Mindest-Extruder-Progress in der Zeit
jam_supply_dwell_time: 120        # s — HALL3-Max-Verweil bei aktivem Feeder
jam_action: PAUSE                 # "PAUSE" oder eigener Macro-Name

# --- Runout ---
runout_pause:     0               # 0 = externer Sensor, 100mm Nachlauf dann off
                                  # 1 = intern pausieren + sofort off
runout_follow_mm: 100             # mm Nachlauf bei runout_pause=0

# --- Triple-Click / Display ---
triple_click_window:    1.5
feed_burst_enabled:     0         # 1 = Feed-Taster 3x-Klick = Burst (Verstopfungsgefahr)
reenable_cooldown:      1.0       # s nach Manual-Op bevor AUTO wiederkommt
reenable_cooldown_fast: 0.5       # s nach Burst
display_status_enabled: 1

# --- Initial-Fill / Sicherheit ---
auto_load_after_follow: 0         # 1 = nach Grip automatisch LOAD_FILAMENT falls heiß
min_temp: 180                     # °C — LOAD/UNLOAD Hotend-Check

[tmc2208 buffer_feeder mellow]
uart_pin: LLL_PLUS:PB1
run_current: 0.450
# Kein stealthchop_threshold → SpreadCycle immer


#####################################################################
#   Hilfs-Macros: E-Mode preservation
#####################################################################

[gcode_macro _SAVE_E_MODE]
# Saves Klipper's full gcode state under a named slot, then switches
# to M83 (relative extrusion) which the LOAD/UNLOAD phase macros rely
# on for their G1 E<distance> moves. If LOAD/UNLOAD aborts with an
# error, the saved state persists in Klipper and can be restored
# later with BUFFER_RESTORE_STATE (or automatically via AUTO_OFF /
# STOP_BUFFER_FILL, which invoke RESTORE best-effort).
gcode:
    SAVE_GCODE_STATE NAME=buffer_feeder_op
    M83

[gcode_macro _RESTORE_E_MODE]
gcode:
    RESTORE_GCODE_STATE NAME=buffer_feeder_op MOVE=0

# BUFFER_RESTORE_STATE: best-effort restore of gcode state saved by
# LOAD/UNLOAD, provided by the Python extension. Safe to call even
# if no state was saved — it will report "no save" instead of erroring.


#####################################################################
#   LOAD_FILAMENT — orchestriert die 3 Phasen
#####################################################################
#
# Phase 1: BUFFER_LOAD_PHASE1 — Feeder allein schnell zum Toolhead.
# Phase 2: BUFFER_LOAD_PHASE2 + G1 E180 parallel — Feeder und Extruder
#          zeitlich koordiniert, KEIN Sync (jeder fährt selbst).
# Phase 3: BUFFER_LOAD_PHASE3 — Feeder fährt bis HALL2.

[gcode_macro LOAD_FILAMENT]
description: Filament laden (3-Phasen, ohne SYNC_EXTRUDER_MOTION)
gcode:
    {% set bf       = printer["buffer_feeder mellow"] %}
    {% set temp     = printer.extruder.temperature %}
    {% set min_temp = bf.min_temp %}
    {% set slow_dist = bf.load_slow_distance %}
    {% set slow_spd  = bf.load_slow_speed %}

    {% if temp < min_temp %}
        {action_raise_error("LOAD abgebrochen: Hotend zu kalt (%.0f/%.0f C)" % (temp, min_temp))}
    {% endif %}

    _SAVE_E_MODE

    M118 LOAD Phase 1: Feeder allein schnell zum Toolhead ({bf.load_fast_distance|int} mm)
    BUFFER_LOAD_PHASE1

    M118 LOAD Phase 2: Feeder + Extruder parallel {slow_dist|int} mm @ {slow_spd} mm/s
    BUFFER_LOAD_PHASE2 DISTANCE={slow_dist} SPEED={slow_spd}
    G1 E{slow_dist} F{(slow_spd * 60)|int}
    M400
    BUFFER_WAIT_IDLE

    M118 LOAD Phase 3: Buffer auffüllen bis HALL2
    BUFFER_LOAD_PHASE3

    _RESTORE_E_MODE
    M118 LOAD abgeschlossen


#####################################################################
#   UNLOAD_FILAMENT — orchestriert Tip-Forming + Sync-Retract + Poll
#####################################################################
#
# Phase 1: Tip-Forming — Extruder macht Push/Pull-Zyklen allein.
#          Feeder steht still (BUFFER_HALT vorher, Extension stoppt).
# Phase 2: Extruder + Feeder parallel zurück, zeitlich koordiniert.
# Phase 3: Feeder allein zurück bis buffer_entrance frei.

[gcode_macro UNLOAD_FILAMENT]
description: Filament entladen (Tip-Forming + Sync-Retract + Feeder-Rückzug)
variable_tip_cycles:       4
variable_tip_push:         8
variable_tip_pull:        10
variable_tip_speed:       20
variable_tip_final_retract: 25
variable_tip_final_speed:   50
gcode:
    {% set bf        = printer["buffer_feeder mellow"] %}
    {% set temp      = printer.extruder.temperature %}
    {% set min_temp  = bf.min_temp %}
    {% set sync_dist = bf.unload_sync_distance %}
    {% set fast_spd  = bf.unload_fast_speed %}

    {% if temp < min_temp %}
        {action_raise_error("UNLOAD abgebrochen: Hotend zu kalt (%.0f/%.0f C)" % (temp, min_temp))}
    {% endif %}

    _SAVE_E_MODE

    # Feeder sauber in Phase-1-State versetzen (stepper aus, Operator-
    # Buttons und FORCE_BUFFER_FILL sind in diesem Zustand gesperrt).
    BUFFER_UNLOAD_PHASE1

    M118 UNLOAD Phase 1: Tip-Forming (Extruder allein)
    {% for i in range(tip_cycles) %}
        G1 E{tip_push} F{(tip_speed * 60)|int}
        G1 E-{tip_pull} F{(tip_speed * 60)|int}
    {% endfor %}
    G1 E-{tip_final_retract} F{(tip_final_speed * 60)|int}
    M400

    M118 UNLOAD Phase 2: Feeder + Extruder parallel {sync_dist|int} mm zurück @ {fast_spd} mm/s
    BUFFER_UNLOAD_PHASE2 DISTANCE={sync_dist} SPEED={fast_spd}
    G1 E-{sync_dist} F{(fast_spd * 60)|int}
    M400
    BUFFER_WAIT_IDLE

    M118 UNLOAD Phase 3: Feeder zurück bis buffer_entrance frei
    BUFFER_UNLOAD_PHASE3

    _RESTORE_E_MODE
    M118 UNLOAD abgeschlossen


#####################################################################
#   Boot-Autostart
#####################################################################
# 7 s Delay, damit Klipper die Pin-States sauber eingelesen hat.
# Wenn Filament am Eingang: Sync-Automatik aktivieren (kein
# automatisches Re-Fill nach Boot - user ruft FORCE_BUFFER_FILL falls
# nötig).

[delayed_gcode _boot_autostart]
initial_duration: 7.0
gcode:
    {% set bf = printer["buffer_feeder mellow"] %}
    {% if bf.entrance_detected %}
        M118 BOOT: Filament am Eingang - AUTO engaged
        {% if bf.state == "IDLE" %}
            BUFFER_AUTO_ON
        {% endif %}
    {% else %}
        M118 BOOT: Kein Filament am Eingang - Standby
    {% endif %}
