###############################################################
#   Mellow LLL Plus Filament Buffer — Klipper Config
###############################################################
#
# Diese Config gehört zur Python-Extension-Architektur (Variante 3).
# Der Feeder-Stepper wird ausschließlich von [buffer_feeder mellow]
# in klippy/extras/buffer_feeder.py verwaltet. KEIN SYNC_EXTRUDER_MOTION,
# KEIN FORCE_MOVE während des Drucks — der Feeder fährt auf seiner
# eigenen trapq, vollständig entkoppelt vom Haupt-Motion-Planner.
#
# Installation:
#   ./install.sh     (im Repo-Root auf dem Host ausführen)
# Danach diese Datei per `[include lll.cfg]` in printer.cfg einbinden.
#
# Voraussetzungen in printer.cfg:
#   [pause_resume]
#   [extruder]
#   max_extrude_only_distance: 400   # mindestens so gross wie der laengste
#                                     # extruder-only Move (hier: unload_sync_distance)
#
# Anpassen nach Kalibrierung (siehe README):
#   • rotation_distance im [buffer_feeder mellow]-Block
#   • load_fast_distance (MEASURE_LOAD_START benutzen)
#   • load_slow_distance (Heatbreak+Nozzle-Länge)
#   • unload_sync_distance (≥ load_slow_distance)
#####################################################################


[mcu LLL_PLUS]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_2D001E001457464E33313420-if00
restart_method: command


#####################################################################
#   Buffer-Feeder — Python-Extension (verwaltet den kompletten Feeder)
#####################################################################

[buffer_feeder mellow]
# --- Hardware: Stepper ---
step_pin: LLL_PLUS:PC13
dir_pin: LLL_PLUS:PA7
enable_pin: !LLL_PLUS:PA6
microsteps: 16
gear_ratio: 50:17
rotation_distance: 18.86          # 1:1-kalibriert (aus Phase 2)

# --- Hardware: Sensoren ---
# Pin-Convention (wie im alten [gcode_button]-Config):
#   ^! = Pullup + Invert. Die Mellow LLL Plus benutzt eine Arm-Mechanik;
#   ein einzelner schwenkbarer Arm blockiert je nach Fuellstand DEN
#   entsprechenden Photo-Interrupter (HALL3 bei leer, HALL2 bei voll,
#   HALL1 bei Ueberlauf). Sensor-geblockt = Pin-HIGH via Pullup (weil
#   Transistor OFF). Klipper-Invertierung via `!` bildet Pin-HIGH auf
#   callback-state=False ab. Die Extension kehrt dann einmal um
#   (polarity_flip=True) fuer die Semantik "Schwelle aktiv = True".
#   Das ist KEIN doppelter Invert - ^! + not() kombinieren zu einer
#   klaren Semantik: True = Sensor aktiv (= Arm blockiert).
hall_empty_pin:      ^!LLL_PLUS:PB4      # HALL3 unten  = Buffer leer
hall_full_pin:       ^!LLL_PLUS:PB3      # HALL2 oben   = Buffer voll
hall_overflow_pin:   ^!LLL_PLUS:PB2      # HALL1 ganz oben = Überlauf
# Entrance-Microswitch schließt bei Filament, ^! liefert state=True
# wenn Filament präsent (standard-Pattern fuer filament_switch_sensor).
entrance_pin:        ^!LLL_PLUS:PB7      # Filament am Buffer-Eingang

# --- Hardware: Taster ---
# Taster: Druck zieht auf GND, ^! liefert state=True bei Druck.
feed_button_pin:     ^!LLL_PLUS:PB12
retract_button_pin:  ^!LLL_PLUS:PB13

# --- Geschwindigkeiten ---
feed_speed:         32            # mm/s — Bang-Bang Auto-Refill (Diagnose 2026-05-18: feed_speed=70 mit gain=1.5
                                  # erzeugt bei flow>=60 mm^3/s zu hohen Buffer->Toolhead Gegendruck — Toolhead-Treibrad
                                  # slipt unter Last (Brummen statt Foerderung). Video-Beleg: nur ~18% des Soll-Flows kommt
                                  # bei flow=60 wirklich durch. cap=32 begrenzt Over-Push bei high-Flow: target=min(vel*1.5,
                                  # 32). Bei flow=60 (vel=25): target=32 statt 37.5, Over-Push faellt von +12.5 auf +7 mm/s.
                                  # Vorher P7-66 C-Tuning: 30->70 fuer Volcano-Hochflow — beibehalten bis flow=50 (sweet-spot
                                  # lief auch mit 70 sauber); ueber 60 mm^3/s ist das Buffer-Toolhead-Push-Pull-Limit der HW)
manual_speed:       15            # mm/s — Taster Dauerlauf
burst_speed:        50            # mm/s — Triple-Click Burst
load_fast_speed:    50            # mm/s — LOAD Phase 1 (Feeder allein zum Toolhead)
load_slow_speed:     5            # mm/s — LOAD Phase 3 (Extruder-Push ins Hotend)
unload_fast_speed:  50            # mm/s — UNLOAD Sync-Move (G1 E-{sync_dist}; Extruder-schonend)
unload_phase3_speed: 50           # mm/s — UNLOAD Phase 3 (Buffer allein; Standard = unload_fast_speed)
grip_speed:         55            # mm/s — Initial-Grip
accel:            1000            # mm/s²

# --- Distanzen / Dauern ---
manual_chunk_distance: 10         # mm — 2-Klick-Puls
burst_distance:      1300         # mm — Retract-Triple-Burst
grip_duration:          5         # s  — Initial-Grip-Dauer (→ ~275mm @ 55mm/s)
load_fast_distance:  1000         # mm — LOAD Phase 1 (kalibriert via MEASURE_LOAD_START)
load_slow_distance:   100         # mm — LOAD Phase 3 (Heatbreak-Push + Nozzle-Purge)
load_buffer_max:     2000         # mm — LOAD Phase 3 Timeout bis HALL2
unload_sync_distance: 400         # mm — UNLOAD Sync-Phase (G1 E-{sync_dist}
                                  # mit BUFFER_SYNC_TO_EXTRUDER aktiv — Buffer
                                  # folgt 1:1; gross genug damit Filament sicher
                                  # aus Heatbreak + Bowden-Eingang raus ist)
unload_fast_max:     5000         # mm — UNLOAD Phase 3 Max (Polling)

# --- Safety ---
# max_feed_time + max_feed_distance sind Safety-Backstops für einen
# nicht-erreichten HALL2 (motor stall, Schlupf, leerer Spool). Werte
# muessen das Worst-Case-Erstbefuellen abdecken: Bowden-Laenge + Buffer-
# Innenweg. Beispiel 2 m Bowden + 600 mm Buffer = 2600 mm. Bei
# feed_speed=30 mm/s sind das 87 s. Defaults daher grosszuegig:
max_feed_time:      180           # s — Max Dauerfeed ohne HALL2-Trigger
max_feed_distance: 4000           # mm — alternative Safety-Grenze
hall_debounce_ms:    50           # ms — Sensor-Debounce
lead_time:           0.12         # s — MCU-Move-Scheduling-Lead (P7-66 C-Tuning: 0.3→0.12 reduziert Inter-Chunk-Gap)
max_move_chunk_mm:   50           # mm — harte Obergrenze pro internem Trapez; größere Moves werden intern gestreamt
interrupt_chunk_mm:   3           # mm — AUTO-Subchunk-Groesse fuer schnelle HALL1/HALL2-Reaktion (Diagnose 2026-05-18: in-flight chunks sind unabbrechbar, _halt_motion kann queued moves nicht abbrechen. Bei chunk=9, vel=38 mm/s ergibt das 237 ms unabbrechbare Move-Zeit — viel zu lange fuer 3.6 mm HALL2->HALL1 Marge. chunk=3 -> 79 ms = sicher unter mechanischer Latenz)
idle_anchor_gap:    10            # s — Anti-stale-clock Watchdog: interval after which idle stepper gets a micro-anchor (P7-70, Issue #12; default 10 s, leave below ~17 s CLOCK_DIFF_MAX)

# --- Jam-Detection ---
jam_detection_enabled: 1
jam_clog_dwell_time:   60         # s — HALL2-Max-Verweil bei aktiver Extrusion
jam_clog_extrude_min:  30         # mm — Mindest-Extruder-Progress in der Zeit
jam_supply_dwell_time: 240        # s — HALL3-Max-Verweil bei aktivem Feeder
                                  # (für 2m+ Bowden hochsetzen — beim
                                  #  Initial-Fill bleibt HALL3 lange aktiv)
jam_action: PAUSE                 # "PAUSE" oder eigener Macro-Name

# --- Runout ---
runout_pause:     0               # 0 = externer Sensor, 100mm Nachlauf dann off
                                  # 1 = intern pausieren + sofort off
runout_follow_mm: 100             # mm Nachlauf bei runout_pause=0

# --- Triple-Click / Display ---
triple_click_window:    1.5
feed_burst_enabled:     0         # 1 = Feed-Taster 3x-Klick = Burst (Verstopfungsgefahr)
reenable_cooldown:      1.0       # s nach Manual-Op bevor AUTO wiederkommt
reenable_cooldown_fast: 0.5       # s nach Burst
use_fault_overlay:      0         # 0 = legacy fault-states; 1 aktiviert Overlay nur fuer LOAD_PHASE_3-Overflow (P7-35); RUNOUT/JAM/anderer OVERFLOW bleiben legacy
use_flush_callback_bang_bang: True   # P7-52 — flush-callback bang-bang (mainline motion_queuing API)
flush_callback_chunk_mm: 45.0        # Chunk-Größe für _on_mcu_flush (P7-66 C-Tuning: 15→45 für höheren Durchsatz; max_move_chunk_mm=50 Cap)

# --- C-cont (Continuous-Streaming) Tuning ---
max_feed_speed:         100.0        # mm/s — Cap für SpeedModulator (muss >= feed_speed)
hall1_persist_timeout:    2.0        # s — HALL1-Soft-Trigger-Schwelle, danach echter OVERFLOW (Hardware-Safety)
filament_diameter:        1.75       # mm — für volumetric-flow-Berechnung im ExtruderVelocityTracker
min_feed_floor:          10.0        # mm/s — Mindest-Nachfoerderung bei HALL3; fuer dieses Referenzsystem bewusst niedriger, damit AUTO bei ~24-30 mm^3/s frueher in die dynamische Regelung kommt
feed_speed_gain:          1.10       # Faktor — Zwischenzone foerdert proportional mit extruder_vel * gain
hall3_demand_gain:        1.5        # Faktor — HALL3-Demand (Buffer leer am Ausgang) foerdert mit extruder_vel * gain;
                                     # finaler target wird auf feed_speed gecapped. Lineare flow-abhaengige Reduktion war
                                     # im 2026-05-18 Run getestet und nicht wirksam (chunk-size dominiert HALL1-Latenz,
                                     # nicht gain) — daher konstant 1.5 ueber alle Flows belassen.
high_flow_mm3s_threshold: 24.0       # mm³/s — oberhalb dieser Schwelle darf die Zwischenzone auch unter min_feed_floor proportional weiter fördern; verhindert Burst-only-Nachfuettern bei ~24mm³/s
feed_hysteresis_stop_factor: 0.70    # Faktor — Schmitt-Trigger-Stop-Schwelle relativ zur Start-Freigabe; hoeher = stoppt spaeter
buffer_debug_events:      False      # Handler-/Ereignis-Trace im klippy.log (Flush-Skips, Submitter-Entscheide, Recovery-Trigger). Nur bei Fehlersuche aktivieren.
buffer_debug_metrics:     True       # Diagnostik-Logs alle 1s im klippy.log (Hardware-Test-Phase; nach Verifikation auf False)
strict_print_start_guard: True       # AUTO-Streaming bleibt bis zur ersten echten Extruderbewegung gesperrt. Verhindert Start-Phasen-Feeds bei HALL3-Ruhestellung.
critical_action_guard_s:  0.35       # s Schutzfenster nach kritischen Flush-/Trapq-Umschaltaktionen. In dieser Zeit keine AUTO-Submits.
buffer_conservative_mode: False      # True = längere Schutzfenster und defensiverer Betrieb fuer Hardware-Diagnose.

# --- Initial-Fill / Sicherheit ---
auto_load_after_follow: 0         # 1 = nach Grip automatisch LOAD_FILAMENT falls heiß
auto_engage_on_print_start: True  # AUTO wird bei realem Druckstart automatisch aktiviert
auto_engage_on_boot: True         # AUTO wird beim Host-/Klipper-Start automatisch aktiviert
min_temp: 180                     # °C — LOAD/UNLOAD Hotend-Check

[tmc2208 buffer_feeder mellow]
uart_pin: LLL_PLUS:PB1
run_current: 0.450
# Kein stealthchop_threshold → SpreadCycle immer


#####################################################################
#   Hilfs-Macros: E-Mode preservation
#####################################################################

[gcode_macro _SAVE_E_MODE]
# Saves Klipper's full gcode state under NAME=buffer_feeder_op (via
# BUFFER_SAVE_MACRO_STATE, which also marks the Python-side
# _macro_state_saved flag), then switches to M83 (relative
# extrusion) which the LOAD/UNLOAD phase macros rely on for their
# G1 E<distance> moves. If LOAD/UNLOAD aborts with an error, the
# saved state persists and is restored automatically by any of
# BUFFER_AUTO_OFF, STOP_BUFFER_FILL, BUFFER_CLEAR_JAM, RESUME (via
# idle_timeout:printing), or manually via BUFFER_RESTORE_STATE.
gcode:
    BUFFER_SAVE_MACRO_STATE BUFFER=mellow
    M83

[gcode_macro _RESTORE_E_MODE]
# Restore + consume the saved slot (Python command also clears the
# _macro_state_saved flag so later cleanup paths don't re-apply it).
gcode:
    BUFFER_RESTORE_MACRO_STATE BUFFER=mellow

# BUFFER_RESTORE_STATE: best-effort restore of gcode state saved by
# LOAD/UNLOAD, provided by the Python extension. Safe to call even
# if no state was saved — it will report "no save" instead of erroring.


#####################################################################
#   LOAD_FILAMENT — sensor-getriebener 3-Phasen-Flow
#####################################################################
#
# Phase 1: Feeder allein schnell bis kurz vor den Toolhead
#          (load_fast_distance, kalibriert via MEASURE_LOAD_START).
# Phase 2: Feeder fuellt den Buffer bis HALL2 (oder HALL1 stable bei
#          Wiederhol-LOAD) ausloest.
#          → Sensor bestaetigt: Filament ist gestaged, Pfad ist frei.
# Phase 3: BUFFER_SYNC_TO_EXTRUDER + G1 E{load_slow_distance} +
#          BUFFER_UNSYNC. Extruder pusht durchs Heatbreak ins Hotend,
#          der Buffer-Stepper laeuft synchron 1:1 mit (P7-44, gegen
#          das passive Durchziehen bei nur 30mm Buffer-Arm-Weg).

[gcode_macro LOAD_FILAMENT]
description: Filament laden (Feeder-Push -> Buffer-Fill -> Extruder-Push)
# Conditional auto-heat: wenn die aktuelle Extruder-Temp unter min_temp liegt,
# heizt das Macro automatisch auf auto_heat_target (default 250 C) statt
# abzubrechen. Anpassen je nach Material (PETG 240, ABS 245, PLA 215, ...).
variable_auto_heat_target: 250
gcode:
    {% set bf       = printer["buffer_feeder mellow"] %}
    {% set temp     = printer.extruder.temperature %}
    {% set min_temp = bf.min_temp %}
    {% set heat_to  = printer["gcode_macro LOAD_FILAMENT"].auto_heat_target %}
    {% set fast_dist = bf.load_fast_distance %}
    {% set fast_spd  = bf.load_fast_speed %}
    {% set slow_dist = bf.load_slow_distance %}
    {% set slow_spd  = bf.load_slow_speed %}
    {% set max3      = bf.load_buffer_max %}
    {% set feed_spd  = bf.feed_speed %}

    {% if temp < min_temp %}
        M118 Hotend zu kalt ({temp|int}/{min_temp|int} C) — heize automatisch auf {heat_to|int} C
        M109 S{heat_to}
    {% endif %}

    # Warnung wenn load_fast_distance noch der Python-Default 1000mm ist —
    # in den meisten Setups deutlich zu viel. MEASURE_LOAD_START kalibriert
    # den realen Buffer→Toolhead-Wert.
    {% if fast_dist == 1000.0 %}
        M118 ⚠ load_fast_distance ist noch Default 1000mm — vor erstem LOAD
        M118    bitte mit MEASURE_LOAD_START kalibrieren (siehe README).
    {% endif %}

    _SAVE_E_MODE

    # Phase 1 nur ausfuehren wenn der Buffer noch nicht gefuellt ist.
    # Bei wiederholtem LOAD (Filament steckt noch im Bowden) ist HALL1
    # oder HALL2 schon beim Macro-Eintritt aktiv, und BUFFER_LOAD_PHASE1
    # wuerde sofort mit "HALL1 OVERFLOW active — aborting" raisen.
    # Am Macro-Eintritt ist der Buffer statisch (kein Feeden), Sensor-
    # Status reflektiert die echte Realitaet — kein Spike-Risiko durch
    # die Momentaufnahme.
    {% if bf.hall_overflow %}
        M118 LOAD: Buffer ueberfuellt (HALL1 aktiv) — skip Phase 1
    {% elif bf.hall_full %}
        M118 LOAD: Buffer voll (HALL2 aktiv) — skip Phase 1
    {% else %}
        M118 LOAD Phase 1/3: Feeder schiebt Filament bis kurz vor den Toolhead ({fast_dist|int} mm @ {fast_spd|int} mm/s)
        BUFFER_LOAD_PHASE1 BUFFER=mellow
    {% endif %}

    M118 LOAD Phase 2/3: Feeder fuellt Buffer bis HALL2 (max {max3|int} mm @ {feed_spd|int} mm/s) — Sensor bestaetigt Staging
    # STABLE_TIMEOUT=1 (P7-48): HALL2 (oder HALL1 mit OVERFLOW_OK=1) muss
    # 1 s kontinuierlich aktiv sein → kurze Drucker-Spikes (Bowden-
    # Widerstand) setzen die Stoppuhr zurueck, aber 1 s reicht um
    # echten Stillstand vom transienten Spike zu unterscheiden.
    # P7-48 ergaenzt: waehrend HALL1 active ist, submittet
    # _load_phase3_tick KEINE neuen Chunks mehr (vorher: bis zu 300mm
    # Ueberfoerderung gegen den Extruder-Klemmen-Stau in 10s).
    # OVERFLOW_OK=1: bei wiederholtem LOAD wo das Filament schon im
    # Pfad steckt, schwingt der Arm direkt durch HALL2 hinaus zu HALL1.
    # Stable HALL1 = Buffer ueberfuellt = Filament ist da → Phase 2
    # sauber beenden statt mit OVERFLOW abbrechen.
    # CHUNK_DISTANCE=50: groessere Foerderwege pro Tick (vorher 10 mm),
    # weniger viele kleine Submits, schnellerer Fill.
    BUFFER_LOAD_PHASE3 BUFFER=mellow STABLE_TIMEOUT=1 OVERFLOW_OK=1 CHUNK_DISTANCE=50

    # Phase 3/3: Extruder pusht durch Heatbreak/Nozzle. Bei nur 30mm
    # Buffer-Arm-Weg muss der Buffer-Stepper von Sekunde 1 mitarbeiten —
    # passives Durchziehen oder bang-bang-Hysterese (Reaktion erst bei
    # HALL3-Trigger) wuerde Filament durch den Buffer hindurch ziehen.
    # Loesung: SYNC_TO_EXTRUDER bindet den Buffer-Stepper an die
    # Extruder-Trapq → 1:1-Lockstep. Wahrend G1 E{slow_dist} pumpt
    # der Buffer-Stepper synchron Filament aus dem Spool-Eingang in
    # den Buffer; gleichzeitig zieht der Extruder Filament aus dem
    # Buffer-Ausgang. Beide Flows sind exakt gleich → Buffer-Volumen
    # konstant, kein Sliding moeglich, Mechanik bleibt definiert.
    # Pattern symmetrisch zu UNLOAD_FILAMENT (Tip-Forming + Final-
    # Retract laufen ebenfalls in SYNC_TO_EXTRUDER).
    BUFFER_SYNC_TO_EXTRUDER BUFFER=mellow EXTRUDER=extruder

    M118 LOAD Phase 3/3: Extruder + Buffer-Stepper synchron — {slow_dist|int} mm @ {slow_spd} mm/s
    G1 E{slow_dist} F{(slow_spd * 60)|int}
    M400

    BUFFER_UNSYNC BUFFER=mellow

    # Nach UNSYNC: AUTO einschalten fuer kommende manuelle Extrusionen
    # / Print-Start. P7-46 (Issue #16): das frueher genutzte
    # `{% if bf.hall_overflow %} skip {% else %} BUFFER_AUTO_ON {% endif %}`
    # war wirkungslos — Klipper-Jinja rendert das ganze Macro EINMAL
    # zur Macro-Start-Zeit, da war HALL1 noch nicht aktiv. Beim
    # tatsaechlichen Erreichen des AUTO_ON-Aufrufs hat sich HALL1
    # laengst geaendert. Loesung: BUFFER_AUTO_ON_IF_READY ist die
    # Python-Variante mit Live-Sensor-Check — bei Block-Reason wird
    # geloggt + return statt raise. Das LOAD-Macro laeuft sauber
    # durch, AUTO engaged spaeter automatisch via auto_engage_on_
    # print_start oder beim ersten HALL3-Trigger.
    BUFFER_AUTO_ON_IF_READY BUFFER=mellow

    _RESTORE_E_MODE
    M118 LOAD abgeschlossen — Filament ist im Hotend, Buffer-Sync entkoppelt


#####################################################################
#   UNLOAD_FILAMENT — Pass-Through-Wrapper auf Python-Workflow
#####################################################################
#
# Wrapper auf cmd_BUFFER_UNLOAD_FILAMENT (klipper_extras/buffer_feeder.py).
# Das Macro reicht nur {rawparams} an den Python-Cmd weiter — die ganze
# Orchestrierung liegt drueben.
#
# Phase 1:   Tip-Forming bei Print-Temp — BUFFER_SYNC_TO_EXTRUDER bindet
#            den Buffer-Stepper an den Extruder, dann Push/Pull-Zyklen
#            via G1 E im sync-Modus. Buffer laeuft 1:1 mit.
# Phase 1.5: Cooling-Move — M104 S{cool_temp},
#            TEMPERATURE_WAIT MAXIMUM={cool_temp_max}. Filament-Spitze
#            kuehlt ab und haertet, weniger sticky beim Final-Retract.
#            Opt-out via USE_COOLING_MOVE=0.
#  Phase 2:  Final-Retract + unload_sync_distance bei kuehlerer Temp —
#            Filament-Spitze kommt sauber durch die Hauptextruder-Zaehne.
# Phase 3:   BUFFER_UNLOAD_PHASE3 — Buffer-Stepper alleine, chunked
#            rueckwaerts bis HALL3 (buffer_entrance) frei meldet oder
#            MAX_DISTANCE erreicht.
#
# Cleanup: try/finally im Python-Cmd garantiert BUFFER_UNSYNC und
# RESTORE_GCODE_STATE auch bei Klipper-Error oder M112 mid-sync.

[gcode_macro CLEAR_JAM]
description: JAM-Lockout aufheben (Buffer in IDLE/AUTO zurueck)
# Wrapper damit der User den BUFFER=mellow mux-key nicht haendisch
# tippen muss. Direkter Aufruf BUFFER_CLEAR_JAM (ohne Wrapper) wirft
# "Error on 'BUFFER_CLEAR_JAM': missing BUFFER" weil register_mux_command
# das Argument zwingend verlangt — Mainline-Konvention bei mehreren
# Modul-Instanzen, gilt auch bei Single-Instance-Setup.
gcode:
    BUFFER_CLEAR_JAM BUFFER=mellow

[gcode_macro UNLOAD_FILAMENT]
description: Filament entladen (Tip-Forming + Cooling + Sync-Retract + Phase 3)
gcode:
    BUFFER_UNLOAD_FILAMENT BUFFER=mellow {rawparams}


#####################################################################
#   BUFFER_BASELINE_RUN — einfacher Konstant-Flow-Test ohne Druck
#####################################################################
#
# Ziel:
# - kein echter Druckjob
# - konstante Extruder-Foerderung fuer 40-60s
# - Buffer soll dabei sauber mitlaufen
# - Debug-Logs / Metrics landen im klippy.log
#
# Der Test:
# 1. homt den Drucker
# 2. heizt die Duese
# 3. faehrt auf eine sichere Beobachtungsposition
# 4. aktiviert AUTO
# 5. extrudiert konstant mit vorgegebenem Volumenstrom
#
# Beispiel:
#   BUFFER_BASELINE_RUN FLOW=30 DURATION=60
#   BUFFER_BASELINE_RUN FLOW=40 DURATION=45 SPEED=100 FEED_SPEED_GAIN=1.20 MIN_FEED_FLOOR=10 HIGH_FLOW_MM3S=20
#
# Hinweise:
# - FLOW ist in mm^3/s
# - DURATION ist in Sekunden
# - FILAMENT_DIAMETER defaultet auf 1.75mm; falls live abweichend
#   getestet wird, hier explizit mitgeben
# - die Extrusion wird intern in sichere E-Chunks geteilt, damit
#   max_extrude_only_distance nicht ueberschritten wird

[gcode_macro BUFFER_BASELINE_RUN]
description: Konstanter Flow-Test fuer Buffer-Baseline (homing + heat + park + timed extrusion)
variable_default_temp: 250
variable_default_flow: 30
variable_default_duration: 60
variable_default_x: 160
variable_default_y: 160
variable_default_z: 200
variable_default_chunk_e: 100
variable_default_travel_f: 12000
variable_default_filament_diameter: 1.75
variable_default_prep_chunk_mm: 5
variable_default_prep_speed: 15
variable_default_prep_max_distance: 200
variable_default_prep_settle_ms: 150
variable_default_tail_duration: 2.0
gcode:
    {% set bf = printer["buffer_feeder mellow"] %}
    {% set macro = printer["gcode_macro BUFFER_BASELINE_RUN"] %}
    {% set case_id = params.CASE_ID|default("adhoc") %}
    {% set temp = params.TEMP|default(macro.default_temp)|float %}
    {% set flow = params.FLOW|default(macro.default_flow)|float %}
    {% set duration = params.DURATION|default(macro.default_duration)|float %}
    {% set x = params.X|default(macro.default_x)|float %}
    {% set y = params.Y|default(macro.default_y)|float %}
    {% set z = params.Z|default(macro.default_z)|float %}
    {% set chunk_e = params.CHUNK_E|default(macro.default_chunk_e)|float %}
    {% set travel_f = params.TRAVEL_F|default(macro.default_travel_f)|float %}
    {% set filament_diameter = params.FILAMENT_DIAMETER|default(macro.default_filament_diameter)|float %}
    {% set prep_chunk_mm = params.PREP_CHUNK_MM|default(macro.default_prep_chunk_mm)|float %}
    {% set prep_speed = params.PREP_SPEED|default(macro.default_prep_speed)|float %}
    {% set prep_max_distance = params.PREP_MAX_DISTANCE|default(macro.default_prep_max_distance)|float %}
    {% set prep_settle_ms = params.PREP_SETTLE_MS|default(macro.default_prep_settle_ms)|int %}
    {% set tail_duration = params.TAIL_DURATION|default(macro.default_tail_duration)|float %}
    {% set area = 3.141592653589793 * (filament_diameter / 2.0) * (filament_diameter / 2.0) %}
    {% set e_rate = flow / area %}
    {% set total_e = e_rate * duration %}
    {% set tail_e = e_rate * tail_duration %}
    {% set feedrate = e_rate * 60.0 %}
    {% set full_chunks = (total_e // chunk_e)|int %}
    {% set remainder = total_e - (full_chunks * chunk_e) %}
    {% set tail_full_chunks = (tail_e // chunk_e)|int %}
    {% set tail_remainder = tail_e - (tail_full_chunks * chunk_e) %}
    {% set flow_s = "%.1f"|format(flow) %}
    {% set duration_s = "%.0f"|format(duration) %}
    {% set e_rate_s = "%.2f"|format(e_rate) %}
    {% set total_e_s = "%.1f"|format(total_e) %}
    {% set feedrate_s = "%.0f"|format(feedrate) %}
    {% set has_tuning_args =
        params.SPEED is defined or
        params.ACCEL is defined or
        params.FEED_SPEED_GAIN is defined or
        params.HALL3_DEMAND_GAIN is defined or
        params.MIN_FEED_FLOOR is defined or
        params.HIGH_FLOW_MM3S is defined or
        params.INTERRUPT_CHUNK_MM is defined or
        params.CHUNK_MM is defined or
        params.LEAD_TIME is defined or
        params.FILAMENT_DIAMETER is defined %}

    # gain konstant 1.5 (Diagnose 2026-05-18, Suite-Run 11:05-11:25):
    # Lineare gain-Reduktion bei flow>50 hat HALL1-OVERFLOW NICHT
    # verhindert (flow=60/70/80 alle reason=overflow). Subagent-Analyse:
    # gain ist irrelevant fuer HALL1-Vermeidung, weil queued sub-chunks
    # unabbrechbar sind. Der eigentliche Hebel ist interrupt_chunk_mm
    # (siehe oben). gain bleibt konstant 1.5 — wird bei flow<=50 sauber
    # match-consumption durch Sub-Chunk-Duty, ueberlebt bei flow>50 mit
    # kleinen Chunks (HALL2-Trigger reagiert in der naechsten Tick-Phase).
    {% set hall3_gain = params.HALL3_DEMAND_GAIN|default(1.5)|float %}
    {% set hall3_gain_s = "%.3f"|format(hall3_gain) %}

    {% if flow <= 0 %}
        { action_raise_error("BUFFER_BASELINE_RUN: FLOW muss > 0 sein") }
    {% endif %}
    {% if duration <= 0 %}
        { action_raise_error("BUFFER_BASELINE_RUN: DURATION muss > 0 sein") }
    {% endif %}
    {% if chunk_e <= 0 %}
        { action_raise_error("BUFFER_BASELINE_RUN: CHUNK_E muss > 0 sein") }
    {% endif %}
    {% if filament_diameter <= 0 %}
        { action_raise_error("BUFFER_BASELINE_RUN: FILAMENT_DIAMETER muss > 0 sein") }
    {% endif %}

    SAVE_GCODE_STATE NAME=buffer_baseline_run
    G90
    M83

    M118 BASELINE: start flow={flow_s}mm^3/s duration={duration_s}s e_rate={e_rate_s}mm/s total_e={total_e_s}mm feedrate={feedrate_s}mm/min chunks={full_chunks}{% if remainder > 0.001 %}+1{% endif %}
    M118 BASELINE: hall3_demand_gain={hall3_gain_s} (konstant)

    # Fuer Hardwaretests die relevanten Buffer-Logs explizit aktivieren.
    # BUFFER_BENCH_MODE oeffnet zugleich das separate Baseline-Logfile
    # unter baseline_log_path (Default ~/printer_data/logs/buffer_baseline.log).
    BUFFER_SET BUFFER=mellow DEBUG_EVENTS=1 DEBUG_METRICS=1
    BUFFER_BENCH_MODE BUFFER=mellow ENABLE=1 DURATION={duration + 900.0} REASON=baseline_run

    # Cancel-Resilienz: jam_action waehrend der Suite deaktivieren,
    # damit ein spurious JAM-Trigger keinen PAUSE ausloest. PAUSE
    # wuerde via idle_timeout:ready das bench_mode abraeumen und die
    # Suite killen. NONE ist das wohldefinierte Disable-Keyword
    # (Klipper-gcode-Parser handhabt leere Strings inkonsistent).
    # Restauriert wird nach dem Tail-Drain weiter unten.
    BUFFER_SET BUFFER=mellow JAM_ACTION=NONE

    # Linear-Tuning: hall3_demand_gain immer setzen (auch ohne expliziten
    # User-Override), damit der berechnete Wert pro Case greift.
    BUFFER_SET BUFFER=mellow HALL3_DEMAND_GAIN={hall3_gain_s}

    # Bench-Test, kein echter Druckjob:
    # Die Suite laeuft als "gedruckte Datei" in Mainsail/Fluidd und
    # setzt damit print_running=True. Das triggert sonst die
    # print-only JAM-/Runout-Waechter (z.B. HALL2-dwell=CLOG) obwohl
    # wir hier absichtlich nur konstante Extruder-Bewegung ohne
    # echten Druckkontext testen. DISABLE_RUNOUT_SENSOR setzt
    # print_running=0 und unterdrueckt damit diese Guards fuer den
    # Bench-Lauf.
    {% if bf.jam_active %}
    M118 BASELINE: stale JAM von vorherigem Bench-Run wird geloescht
    BUFFER_CLEAR_JAM BUFFER=mellow
    {% endif %}
    DISABLE_RUNOUT_SENSOR BUFFER=mellow
    M118 BASELINE: print-only JAM/Runout-Guards fuer Bench-Test deaktiviert

    # Optionale Live-Tuning-Werte fuer diesen Lauf direkt uebernehmen.
    # HALL3_DEMAND_GAIN wird oben bereits unkonditional gesetzt — hier
    # nur durchgereicht wenn der User explizit ueberschreiben will.
    {% if has_tuning_args %}
    BUFFER_SET BUFFER=mellow{% if params.SPEED is defined %} SPEED={params.SPEED}{% endif %}{% if params.ACCEL is defined %} ACCEL={params.ACCEL}{% endif %}{% if params.FEED_SPEED_GAIN is defined %} FEED_SPEED_GAIN={params.FEED_SPEED_GAIN}{% endif %}{% if params.MIN_FEED_FLOOR is defined %} MIN_FEED_FLOOR={params.MIN_FEED_FLOOR}{% endif %}{% if params.HIGH_FLOW_MM3S is defined %} HIGH_FLOW_MM3S={params.HIGH_FLOW_MM3S}{% endif %}{% if params.INTERRUPT_CHUNK_MM is defined %} INTERRUPT_CHUNK_MM={params.INTERRUPT_CHUNK_MM}{% endif %}{% if params.CHUNK_MM is defined %} CHUNK_MM={params.CHUNK_MM}{% endif %}{% if params.LEAD_TIME is defined %} LEAD_TIME={params.LEAD_TIME}{% endif %}{% if params.FILAMENT_DIAMETER is defined %} FILAMENT_DIAMETER={params.FILAMENT_DIAMETER}{% endif %}
    {% endif %}

    # Setup nur einmalig pro Suite: home wenn noch nicht homed; Temp und
    # Position immer mitgeben — M109 wartet nur tatsaechlich wenn die
    # Temperatur abweicht, ein G1 auf die aktuelle Position erzeugt
    # keine Hardware-Bewegung. So bleibt der Toolhead zwischen Cases
    # an der Parkposition stehen und es wird nur die Flowrate gewechselt.
    {% if 'xyz' not in printer.toolhead.homed_axes|lower %}
    M118 BASELINE: homing (axes nicht referenziert)
    G28
    {% endif %}
    M109 S{temp}
    G1 X{x} Y{y} Z{z} F{travel_f}

    M118 BASELINE: neutralisiere Buffer fuer Messstart
    BUFFER_PREP_BASELINE BUFFER=mellow CHUNK_MM={prep_chunk_mm} SPEED={prep_speed} MAX_DISTANCE={prep_max_distance} SETTLE_MS={prep_settle_ms}
    BUFFER_STATE_DUMP BUFFER=mellow

    M118 BASELINE: AUTO aktivieren und Zustand loggen
    BUFFER_AUTO_ON BUFFER=mellow
    BUFFER_STATE_DUMP BUFFER=mellow

    BUFFER_BENCHMARK_MARK BUFFER=mellow EVENT=MEASURE_START CASE_ID={case_id}
    M118 BASELINE: konstante Extrusion gestartet
    {% for _ in range(full_chunks) %}
        G1 E{chunk_e} F{feedrate}
    {% endfor %}
    {% if remainder > 0.001 %}
        G1 E{remainder} F{feedrate}
    {% endif %}

    M400
    BUFFER_BENCHMARK_MARK BUFFER=mellow EVENT=MEASURE_END CASE_ID={case_id}
    M118 BASELINE: Messfenster beendet, AUTO aus und Tail-Drain startet
    BUFFER_AUTO_OFF BUFFER=mellow ABORT_WORKFLOW=0
    {% if tail_duration > 0 and tail_e > 0.001 %}
        {% for _ in range(tail_full_chunks) %}
            G1 E{chunk_e} F{feedrate}
        {% endfor %}
        {% if tail_remainder > 0.001 %}
            G1 E{tail_remainder} F{feedrate}
        {% endif %}
    {% endif %}
    M400
    BUFFER_WAIT_IDLE BUFFER=mellow
    BUFFER_STATE_DUMP BUFFER=mellow
    # jam_action zurueck auf PAUSE (Klipper-default), damit nach der
    # Suite normale Drucke wieder durch JAM/CLOG-Erkennung geschuetzt
    # sind. Falls jemand bewusst leerzeichen-strings in lll.cfg setzt,
    # restauriert das hier auf PAUSE — dokumentiert auf der mailing list.
    BUFFER_SET BUFFER=mellow JAM_ACTION=PAUSE
    BUFFER_BENCH_MODE BUFFER=mellow ENABLE=0
    M118 BASELINE: fertig flow={flow_s}mm^3/s duration={duration_s}s

    RESTORE_GCODE_STATE NAME=buffer_baseline_run


#####################################################################
#   Boot-Autostart
#####################################################################
# 7 s Delay, damit Klipper die Pin-States sauber eingelesen hat.
# Die eigentliche Auto-Engage-Logik laeuft schon beim klippy:ready in
# buffer_feeder.py (auto_engage_on_boot=1). Dieses delayed_gcode
# spiegelt nur den finalen State per M118 — kein automatisches Re-Fill
# nach Boot, user ruft FORCE_BUFFER_FILL falls noetig.

[delayed_gcode _boot_autostart]
initial_duration: 7.0
gcode:
    # Boot-Status reporten. Mit auto_engage_on_boot=1 (default) ist der
    # Buffer schon beim Klipper-ready in AUTO gegangen wenn Filament da
    # ist — Bang-Bang reagiert dann auch auf manuelle Mainsail-G1-E-
    # Aufrufe ohne aktiven Print. Diese Meldung spiegelt den aktuellen
    # State wider.
    {% set bf = printer["buffer_feeder mellow"] %}
    {% if bf.state == "AUTO" %}
        M118 BOOT: Filament am Eingang, Buffer in AUTO (Bang-Bang aktiv)
    {% elif bf.entrance_detected %}
        M118 BOOT: Filament am Eingang - Standby (Buffer wartet auf Print/AUTO_ON)
    {% else %}
        M118 BOOT: Kein Filament am Eingang - Standby
    {% endif %}
