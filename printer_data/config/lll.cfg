#####################################################################
#                  Mellow LLL Filament Plus Buffer
#                  Klipper-Config (Mainline)
#####################################################################
#
# Architektur: Variante 2 - Happy-Hare-Style Sync-Feedback
# --------------------------------------------------------
# Der Feeder-Stepper [extruder_stepper mellow] ist permanent an den
# Hauptextruder gekoppelt (SYNC_EXTRUDER_MOTION EXTRUDER=mellow
# MOTION_QUEUE=extruder). Er bewegt sich damit 1:1 mit jeder
# Extruder-Bewegung - Teil der normalen Extruder-Move-Queue. KEINE
# separaten FORCE_MOVE-Aufrufe waehrend des Drucks, keine
# Druck-Pausen durch toolhead.flush_step_generation().
#
# Die Hall-Sensoren steuern NICHT mehr einen eigenstaendigen Feed-Loop,
# sondern aendern nur die effektive rotation_distance:
#   HALL3 AKTIV (Leer)    -> rotation_distance kleiner  -> mehr Transport
#                            pro Extruder-mm -> Buffer fuellt sich
#   HALL2 AKTIV (Voll)    -> rotation_distance groesser -> weniger Transport
#                            pro Extruder-mm -> Buffer leert sich
#   HALL1 AKTIV (Ueberlast)-> Sync komplett AUS + overfill_lock
#
# Modulation = +/- sync_modulation (zentral in _FILAMENT_VARS).
#
# FORCE_MOVE wird nur ausserhalb aktiver Drucke verwendet:
#   - Initial-Grip / Initial-Follow (Erstbefuellung)
#   - Manuelle Taster (Feed/Retract/Burst)
#   - LOAD_FILAMENT Phase 1 und 3
#   - UNLOAD_FILAMENT Phase 3 (_UNLOAD_FAST_RETRACT)
# In allen Faellen wird Sync vorher getrennt (_SYNC_OFF) und
# hinterher via _APPLY_SYNC_STATE wiederhergestellt.
#
# Plattform: Klipper Mainline (Klipper3d/klipper). Mux-Key
# SYNC_EXTRUDER_MOTION EXTRUDER=mellow. Nicht kompatibel mit Kalico-
# Forks ohne Anpassung des Mux-Keys.
#
# VORAUSSETZUNGEN in der Haupt-printer.cfg:
#   [force_move]
#   enable_force_move: True
#
#   [pause_resume]             # fuer PAUSE im runout_gcode
#
#   [extruder]
#   max_extrude_only_distance: 250   # >= load_slow / unload_sync
#
#####################################################################

#####################################################################
#              Plattform: MCU
#####################################################################

[mcu LLL_PLUS]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_2D001E001457464E33313420-if00
restart_method: command

#####################################################################
#              Feeder-Stepper
#####################################################################

[extruder_stepper mellow]
extruder: extruder
step_pin: LLL_PLUS:PC13
dir_pin: LLL_PLUS:PA7
enable_pin: !LLL_PLUS:PA6
microsteps: 16
gear_ratio: 50:17
# Initial-Wert fuer Klipper-Boot. Zur Laufzeit wird dieser Wert
# dynamisch ueberschrieben (SET_EXTRUDER_ROTATION_DISTANCE, siehe
# _APPLY_SYNC_STATE). Kalibrierung erfolgt ueber
# _FILAMENT_VARS.sync_rotation_distance.
rotation_distance: 18.86

#####################################################################
#              TMC2208 Feeder-Treiber
#####################################################################

[tmc2208 extruder_stepper mellow]
uart_pin: LLL_PLUS:PB1
# 0.450 A: Kompromiss zwischen Grip-Drehmoment und Pancake-Temperatur.
run_current: 0.450
# Kein stealthchop_threshold -> immer SpreadCycle (stabileres Drehmoment
# bei hoher Drehzahl, weniger thermische Verluste).

#####################################################################
#              Konfigurierbare Parameter
#####################################################################

[gcode_macro _FILAMENT_VARS]

# === ZENTRALE SYNC-PARAMETER ======================================
# Kalibrierte rotation_distance fuer 1:1-Mitlauf mit dem Hauptextruder.
# Kalibrier-Rezept: Sync aktivieren, 100 mm via G1 E100 F60 extrudieren,
# dann nachmessen wie viel Filament AM FEEDER durchgezogen wurde.
# Abweichung -> Wert proportional anpassen:
#    neu = alt * (gemessene_mm / 100)
variable_sync_rotation_distance: 18.86

# Modulation der Feed-Rate (Anteil 0..1, z.B. 0.20 = +/- 20%).
# Bei HALL3 AKTIV wird der Feeder um diesen Prozentsatz SCHNELLER,
# bei HALL2 AKTIV entsprechend LANGSAMER gefahren (via effektiver
# rotation_distance = nominal / (1 +/- modulation)).
variable_sync_modulation: 0.20

# === Allgemein ====================================================
# Schnelle Feeder-Geschwindigkeit fuer FORCE_MOVE [mm/s]
variable_fast_speed: 50

# Langsame Geschwindigkeit fuer LOAD-Phase-2 via G1 E [mm/s]
variable_slow_speed: 5

# Mindest-Hotend-Temperatur - bei Unterschreitung Abbruch [C]
variable_min_temp: 180

# === LOAD-Distanzen ===============================================
# Feeder-Strecke vom buffer_entrance bis Toolhead-Eingang [mm].
# Kalibrieren via MEASURE_LOAD_START / MEASURE_LOAD_STOP. Gilt auch
# fuer UNLOAD Phase 3a (gleicher Weg rueckwaerts).
variable_load_fast_distance: 1000
# Sync-Durchfahrts-Strecke Hotend (Extruder-Eingang bis Nozzle) [mm]
variable_load_slow: 180
# Sicherheits-Timeout fuer LOAD Phase 3 (HALL2-getriggert) [mm]
variable_load_buffer_max: 2000

# === UNLOAD-Distanzen =============================================
variable_unload_sync:     180
variable_unload_fast_max: 2510

# === Tip-Forming ==================================================
variable_tip_cycles:        4
variable_tip_push:          8
variable_tip_pull:          10
variable_tip_speed:         20
variable_tip_final_retract: 25
variable_tip_final_speed:   50

# === Initial-Grip-Phase ===========================================
variable_initial_grip_speed:    55
variable_initial_grip_duration: 10
variable_initial_follow_speed:    15
variable_initial_follow_duration: 30

# === Triple-Click-Burst ===========================================
variable_triple_click_distance: 1300
variable_triple_click_window:   1.5

# === Manuelle Taster-/Loop-Parameter ==============================
# DISTANCE fuer Manual-Feed/Retract-Loops und _UNLOAD_FAST_RETRACT
variable_manual_chunk_distance: 10
# VELOCITY fuer Manual-Taster (Feed + Retract vereinheitlicht)
variable_manual_speed:          15
# ACCEL fuer alle FORCE_MOVE-Aufrufe
variable_force_move_accel:    1000
# Tick-Rate des Manual-Loops [s]
variable_manual_loop_tick:     0.1
# Cooldown nach manuellem Taster-Release bis Sync wieder aktiv [s]
variable_reenable_cooldown:      1
# Kuerzerer Cooldown nach Triple-Click-Burst [s]
variable_reenable_cooldown_fast: 0.5

# === Runout-Verhalten =============================================
# Soll Filament-Runout am buffer_entrance direkt eine Druckpause
# ausloesen? 0 = externer Sensor uebernimmt Pause, Feeder laeuft
# noch 100 mm synchron weiter und wird dann disabled.
# 1 = sofort pausieren und Feeder disable.
variable_runout_pause: 0

# === Display-/Debug-Ausgabe =======================================
# Aktiviert M117-Statusanzeige (Drucker-Display) fuer alle Events.
# 0 = keine M117-Ausgaben (stiller Betrieb, reduziert Log-Last),
# 1 = M117 in Buttons, Runout, LOAD/UNLOAD, Mess-Modus etc. (Default).
variable_display_status_enabled: 1

gcode:
    # Reine Variablen-Container-Macro

#####################################################################
#              Private Helper-Makros
#####################################################################

# Sync trennen UND rotation_distance auf kalibrierten 1:1-Wert zuruecksetzen.
# Stellt sicher dass alle nachfolgenden FORCE_MOVE-Ops (Initial-Grip,
# manuelle Taster, LOAD/UNLOAD Phase 1+3, Triple-Burst) immer mit der
# kalibrierten 1:1-rotation_distance arbeiten - unabhaengig davon welcher
# Hall-Sensor die rotation_distance zuletzt moduliert hatte.
[gcode_macro _SYNC_OFF]
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=
    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={v.sync_rotation_distance}

# Zentrale Sync-/Rotation-Distance-Entscheidung. Liest Hall-States
# direkt aus der Klipper-Eventqueue (Raw-Button-State), nicht mehr
# ueber Mirror-Variablen.
#
# Prioritaet (Phase 2):
#   1) sync_locked == 1  -> komplett ignorieren, kein Eingriff
#      (wird von Runout, LOAD Phase 2, UNLOAD Phase 1+2 gesetzt)
#   2) Guard-Bedingungen (system_enabled=0 / manual_operation=1 /
#      initial_lockout=1 / overfill_lock=1) -> Sync AUS
#   3) Sonst Sync AN gegen extruder-Queue mit Hysterese-Latch:
#      - HALL3 aktiv -> fast_rd, sync_state=1 (bleibt bis HALL2)
#      - HALL2 aktiv -> slow_rd, sync_state=2 (bleibt bis HALL3)
#      - Kein Hall aktiv -> letzten sync_state halten (Hysterese):
#          sync_state=1 -> fast_rd, =2 -> slow_rd, =0 (Init) -> nominal
#   HALL1 (Ueberlast) ist separat via overfill_lock eingehaengt und
#   wird hier daher nicht im Hall-Zweig abgefragt.
#
# WICHTIG: Die Hall-Button-Pins sind mit `^!` konfiguriert (pullup +
# invert). Daraus folgt:
#     Sensor physisch AKTIV   ->   press event nicht, release event ja
#                             ->   state == "RELEASED"
#     Sensor physisch FREI    ->   state == "PRESSED"
# Darum unten: "RELEASED == Sensor aktiv".
[gcode_macro _APPLY_SYNC_STATE]
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set b = printer["gcode_macro _BUFFER_AUTO_CONTROL"] %}
    {% if b.sync_locked == 0 %}
        {% set hall1_active = printer["gcode_button buffer_hall1"].state == "RELEASED" %}
        {% set hall2_active = printer["gcode_button buffer_hall2"].state == "RELEASED" %}
        {% set hall3_active = printer["gcode_button buffer_hall3"].state == "RELEASED" %}
        {% set nominal = v.sync_rotation_distance | float %}
        {% set mod     = v.sync_modulation | float %}
        {% set fast_rd = (nominal / (1.0 + mod)) | round(4) %}
        {% set slow_rd = (nominal / (1.0 - mod)) | round(4) %}

        {% if b.system_enabled == 0 or b.manual_operation == 1 or b.initial_lockout == 1 or b.overfill_lock == 1 %}
            SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=
        {% else %}
            SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=extruder
            {% if hall3_active %}
                SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_state VALUE=1
                SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={fast_rd}
            {% elif hall2_active %}
                SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_state VALUE=2
                SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={slow_rd}
            {% else %}
                # Kein Hall aktiv -> Hysterese: letzten Latch-Zustand halten
                {% if b.sync_state == 1 %}
                    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={fast_rd}
                {% elif b.sync_state == 2 %}
                    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={slow_rd}
                {% else %}
                    # Initialisierung: noch kein Hall-Event gesehen -> neutral
                    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={nominal}
                {% endif %}
            {% endif %}
        {% endif %}
    {% endif %}

# Konsolidiert die Init-Sequenz aus buffer_entrance.insert_gcode
# und FORCE_BUFFER_FILL. Startet Initial-Grip + Follow.
[gcode_macro _PREPARE_INITIAL_FILL]
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=system_enabled VALUE=1
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=overfill_lock VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_lockout VALUE=1
    _APPLY_SYNC_STATE
    UPDATE_DELAYED_GCODE ID=_start_initial_grip DURATION=0.1

# Stoppt alle aktiven Feed-Loops (Manual, Initial-Follow) und
# raeumt die zugehoerigen Flags auf. Caller muss danach selbst
# _APPLY_SYNC_STATE rufen, weil die Post-Action unterschiedlich ist.
[gcode_macro _ABORT_ALL_FEED_LOOPS]
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_lockout VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_follow_active VALUE=0
    SET_GCODE_VARIABLE MACRO=_MANUAL_FEED VARIABLE=active VALUE=0
    SET_GCODE_VARIABLE MACRO=_MANUAL_RETRACT VARIABLE=active VALUE=0
    UPDATE_DELAYED_GCODE ID=_manual_feed_loop DURATION=0
    UPDATE_DELAYED_GCODE ID=_manual_retract_loop DURATION=0
    UPDATE_DELAYED_GCODE ID=_initial_follow_loop DURATION=0
    UPDATE_DELAYED_GCODE ID=_initial_follow_end DURATION=0

# Speichert den aktuellen E-Absolut/Relativ-Modus und schaltet auf M83.
# Paarweise mit _RESTORE_E_MODE zu verwenden.
[gcode_macro _SAVE_E_MODE]
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=saved_e_abs VALUE={1 if printer.gcode_move.absolute_extrude else 0}
    M83

# Stellt den von _SAVE_E_MODE gespeicherten E-Modus wieder her.
[gcode_macro _RESTORE_E_MODE]
gcode:
    {% if printer["gcode_macro _BUFFER_AUTO_CONTROL"].saved_e_abs %}
        M82
    {% else %}
        M83
    {% endif %}

# Deduplifizierter Feed-/Retract-Button-Handler. Wird aus den
# [gcode_button feed_button] / [gcode_button retract_button]
# press_gcode-Bloecken aufgerufen mit DIRECTION=FEED oder =RETRACT.
# Klick-Semantik: 1x = Dauerlauf, 2x = Chunk-Puls, 3x = Triple-Burst.
[gcode_macro _BUTTON_CLICK_HANDLER]
gcode:
    {% set dir = params.DIRECTION|default('FEED')|upper %}
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set t = printer["gcode_macro _TRIPLE_CLICK_STATE"] %}

    {% if dir == 'FEED' %}
        {% set new_count = (t.feed_count | int) + 1 %}
        {% set count_var = 'feed_count' %}
        {% set reset_id  = '_triple_feed_reset' %}
        {% set loop_id   = '_manual_feed_loop' %}
        {% set burst_macro = '_TRIPLE_FEED_BURST' %}
        {% set manual_macro = '_MANUAL_FEED' %}
        {% set puls_sign = 1 %}
        {% set word = 'Vorschub' %}
    {% else %}
        {% set new_count = (t.retract_count | int) + 1 %}
        {% set count_var = 'retract_count' %}
        {% set reset_id  = '_triple_retract_reset' %}
        {% set loop_id   = '_manual_retract_loop' %}
        {% set burst_macro = '_TRIPLE_RETRACT_BURST' %}
        {% set manual_macro = '_MANUAL_RETRACT' %}
        {% set puls_sign = -1 %}
        {% set word = 'Rueckzug' %}
    {% endif %}

    {% if new_count >= 3 %}
        SET_GCODE_VARIABLE MACRO=_TRIPLE_CLICK_STATE VARIABLE={count_var} VALUE=0
        UPDATE_DELAYED_GCODE ID={reset_id} DURATION=0
        {burst_macro}
    {% elif new_count == 2 %}
        M118 {word}-Taster (2. Klick) - {v.manual_chunk_distance} mm Puls
        SET_GCODE_VARIABLE MACRO={manual_macro} VARIABLE=active VALUE=0
        UPDATE_DELAYED_GCODE ID={loop_id} DURATION=0
        SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
        _SYNC_OFF
        FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE={puls_sign * v.manual_chunk_distance} VELOCITY={v.manual_speed} ACCEL={v.force_move_accel}
        SET_GCODE_VARIABLE MACRO=_TRIPLE_CLICK_STATE VARIABLE={count_var} VALUE={new_count}
        UPDATE_DELAYED_GCODE ID={reset_id} DURATION={v.triple_click_window}
        UPDATE_DELAYED_GCODE ID=_reenable_autofeed DURATION={v.reenable_cooldown}
    {% else %}
        M118 {word}-Taster - Dauerlauf startet
        SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
        _SYNC_OFF
        SET_GCODE_VARIABLE MACRO={manual_macro} VARIABLE=active VALUE=1
        {manual_macro}
        SET_GCODE_VARIABLE MACRO=_TRIPLE_CLICK_STATE VARIABLE={count_var} VALUE={new_count}
        UPDATE_DELAYED_GCODE ID={reset_id} DURATION={v.triple_click_window}
    {% endif %}

#####################################################################
#              State-Container
#####################################################################

[gcode_macro _BUFFER_AUTO_CONTROL]
variable_system_enabled: 0
variable_manual_operation: 0
variable_overfill_lock: 0
variable_print_running: 0
# 1 = Hall2/3 ignorieren (Hall1 bleibt scharf, TPU-Stau-Schutz)
variable_initial_lockout: 0
variable_initial_follow_active: 0
# E-Modus-Buchhaltung fuer LOAD/UNLOAD (von _SAVE_E_MODE gesetzt)
variable_saved_e_abs: 0
# Sync-Hard-Lock: 1 = _APPLY_SYNC_STATE macht nichts (fuer LOAD/UNLOAD
# Sync-Phasen und Runout, damit Hall-Events die Sync-Logik nicht stoeren)
variable_sync_locked: 0
# Hysterese-Latch fuer Hall-Zustand: 0 = Init/neutral, 1 = fast (HALL3),
# 2 = slow (HALL2). Bleibt gesetzt bis der gegenteilige Hall triggert.
variable_sync_state: 0
# Referenzwert von print_stats.filament_used beim Runout-Event.
# Wird vom _runout_stepper_disable-Polling-Loop genutzt.
variable_runout_filament_ref: 0
gcode:
    # Body leer: State wird von Callern via SET_GCODE_VARIABLE manipuliert,
    # _APPLY_SYNC_STATE wird explizit aus jedem State-Setter gerufen und
    # braucht keinen impliziten Re-Sync hier.

[gcode_macro _TRIPLE_CLICK_STATE]
variable_feed_count: 0
variable_retract_count: 0
gcode:

#####################################################################
#              Taster und manuelle Loops
#####################################################################
# Alle manuellen Ops trennen vorher den Sync (via _SYNC_OFF), damit
# FORCE_MOVE den Feeder frei bewegen kann. Nach der Op wird ueber
# _APPLY_SYNC_STATE der Zustand wiederhergestellt.

[gcode_button feed_button]
pin: ^!LLL_PLUS:PB12
press_gcode:
    # Im Mess-Modus Toggle-Verhalten: 1. Klick startet Foerderung,
    # 2. Klick stoppt und gibt MEASURE_LOAD-Ergebnis aus.
    {% if printer["gcode_macro _MEASURE_LOAD_STATE"].active == 1 %}
        {% if printer["gcode_macro _MANUAL_FEED"].active == 1 %}
            # Bereits am Foerdern -> stoppen + Messung ausgeben
            SET_GCODE_VARIABLE MACRO=_MANUAL_FEED VARIABLE=active VALUE=0
            UPDATE_DELAYED_GCODE ID=_manual_feed_loop DURATION=0
            MEASURE_LOAD_STOP
        {% else %}
            # Noch nicht gestartet -> Foerderung starten (loop zaehlt distance)
            {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
            M118 MESSUNG: Foerderung laeuft - erneut druecken zum Stoppen
            {% if v.display_status_enabled == 1 %}
                M117 Messen: laeuft...
            {% endif %}
            SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
            _SYNC_OFF
            SET_GCODE_VARIABLE MACRO=_MANUAL_FEED VARIABLE=active VALUE=1
            _MANUAL_FEED
        {% endif %}
    {% else %}
        # Normalbetrieb: Triple-Click-Logik via Handler
        _BUTTON_CLICK_HANDLER DIRECTION=FEED
    {% endif %}
release_gcode:
    # Im Mess-Modus: Loslassen macht NICHTS (Toggle-Betrieb)
    {% if printer["gcode_macro _MEASURE_LOAD_STATE"].active == 0 %}
        {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
        M118 Vorschub-Taster losgelassen
        SET_GCODE_VARIABLE MACRO=_MANUAL_FEED VARIABLE=active VALUE=0
        UPDATE_DELAYED_GCODE ID=_manual_feed_loop DURATION=0
        UPDATE_DELAYED_GCODE ID=_reenable_autofeed DURATION={v.reenable_cooldown}
    {% endif %}

[gcode_button retract_button]
pin: ^!LLL_PLUS:PB13
press_gcode:
    _BUTTON_CLICK_HANDLER DIRECTION=RETRACT
release_gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    M118 Rueckzug-Taster losgelassen
    SET_GCODE_VARIABLE MACRO=_MANUAL_RETRACT VARIABLE=active VALUE=0
    UPDATE_DELAYED_GCODE ID=_manual_retract_loop DURATION=0
    UPDATE_DELAYED_GCODE ID=_reenable_autofeed DURATION={v.reenable_cooldown}

[gcode_macro _MANUAL_FEED]
variable_active: 0
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    {% if active == 1 %}
        FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE={v.manual_chunk_distance} VELOCITY={v.manual_speed} ACCEL={v.force_move_accel}
        # Distance-Tracking fuer MEASURE_LOAD-Mess-Modus
        {% if printer["gcode_macro _MEASURE_LOAD_STATE"].active == 1 %}
            {% set cur = printer["gcode_macro _MEASURE_LOAD_STATE"].distance %}
            SET_GCODE_VARIABLE MACRO=_MEASURE_LOAD_STATE VARIABLE=distance VALUE={cur + v.manual_chunk_distance}
        {% endif %}
        UPDATE_DELAYED_GCODE ID=_manual_feed_loop DURATION={v.manual_loop_tick}
    {% endif %}

[gcode_macro _MANUAL_RETRACT]
variable_active: 0
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    {% if active == 1 %}
        FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE=-{v.manual_chunk_distance} VELOCITY={v.manual_speed} ACCEL={v.force_move_accel}
        UPDATE_DELAYED_GCODE ID=_manual_retract_loop DURATION={v.manual_loop_tick}
    {% endif %}

[delayed_gcode _manual_feed_loop]
gcode:
    _MANUAL_FEED

[delayed_gcode _manual_retract_loop]
gcode:
    _MANUAL_RETRACT

[gcode_macro _TRIPLE_FEED_BURST]
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set duration = (v.triple_click_distance / v.fast_speed + 0.5) | round(1) %}
    M118 Triple-Feed-Burst: {v.triple_click_distance} mm @ {v.fast_speed} mm/s vor (~{duration}s)
    SET_GCODE_VARIABLE MACRO=_MANUAL_FEED VARIABLE=active VALUE=0
    UPDATE_DELAYED_GCODE ID=_manual_feed_loop DURATION=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
    _SYNC_OFF
    FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE={v.triple_click_distance} VELOCITY={v.fast_speed} ACCEL={v.force_move_accel}
    UPDATE_DELAYED_GCODE ID=_reenable_autofeed DURATION={v.reenable_cooldown_fast}

[gcode_macro _TRIPLE_RETRACT_BURST]
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set duration = (v.triple_click_distance / v.fast_speed + 0.5) | round(1) %}
    M118 Triple-Retract-Burst: {v.triple_click_distance} mm @ {v.fast_speed} mm/s zurueck (~{duration}s)
    SET_GCODE_VARIABLE MACRO=_MANUAL_RETRACT VARIABLE=active VALUE=0
    UPDATE_DELAYED_GCODE ID=_manual_retract_loop DURATION=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
    _SYNC_OFF
    FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE=-{v.triple_click_distance} VELOCITY={v.fast_speed} ACCEL={v.force_move_accel}
    UPDATE_DELAYED_GCODE ID=_reenable_autofeed DURATION={v.reenable_cooldown_fast}

[delayed_gcode _triple_feed_reset]
gcode:
    SET_GCODE_VARIABLE MACRO=_TRIPLE_CLICK_STATE VARIABLE=feed_count VALUE=0

[delayed_gcode _triple_retract_reset]
gcode:
    SET_GCODE_VARIABLE MACRO=_TRIPLE_CLICK_STATE VARIABLE=retract_count VALUE=0

# Wird nach manuellen Ops gerufen, raeumt manual_operation auf und
# kickt dann _APPLY_SYNC_STATE an.
[delayed_gcode _reenable_autofeed]
gcode:
    M118 Automatik-Vorschub wieder aktiv
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
    _APPLY_SYNC_STATE

#####################################################################
#              Hall-Sensoren
#####################################################################
# Hall-Sensor-Layout (physische Anordnung laut Foto):
#   HALL3 unten, nahe Filament-Eingang    -> Leer-Schwelle (untere Grenze)
#   HALL2 oben                            -> Voll-Schwelle (obere Arbeitsgrenze)
#   HALL1 oben, dicht neben HALL2         -> Ueberlast-Notanschlag
#
# press_gcode = Sensor FREI, release_gcode = Sensor AKTIV
# (Hardware-Invertierung via ^! - siehe buffer_hall2 etc.)

# HALL3 - Leer-Schwelle (unten). AKTIV -> Feeder schneller (Buffer auffuellen)
[gcode_button buffer_hall3]
pin: ^!LLL_PLUS:PB4
press_gcode:
    {% if printer["gcode_macro _BUFFER_AUTO_CONTROL"].initial_lockout == 1 %}
        M118 HALL3 FREI (ignoriert - Initial-Lockout)
    {% else %}
        M118 HALL3 FREI - Hals verlaesst Leer-Schwelle (Feed -> neutral)
        _APPLY_SYNC_STATE
    {% endif %}
release_gcode:
    {% if printer["gcode_macro _BUFFER_AUTO_CONTROL"].initial_lockout == 1 %}
        M118 HALL3 AKTIV (ignoriert - Initial-Lockout)
    {% else %}
        M118 HALL3 AKTIV - Leer-Schwelle erreicht (Feed +{(printer["gcode_macro _FILAMENT_VARS"].sync_modulation * 100)|int}%)
        _APPLY_SYNC_STATE
    {% endif %}

# HALL2 - Voll-Schwelle (oben). AKTIV -> Feeder langsamer (Buffer leeren)
[gcode_button buffer_hall2]
pin: ^!LLL_PLUS:PB3
press_gcode:
    {% if printer["gcode_macro _BUFFER_AUTO_CONTROL"].initial_lockout == 1 %}
        M118 HALL2 FREI (ignoriert - Initial-Lockout)
    {% else %}
        M118 HALL2 FREI - Hals verlaesst Voll-Schwelle (Feed -> neutral)
        _APPLY_SYNC_STATE
    {% endif %}
release_gcode:
    {% if printer["gcode_macro _BUFFER_AUTO_CONTROL"].initial_lockout == 1 %}
        M118 HALL2 AKTIV (ignoriert - Initial-Lockout)
    {% else %}
        M118 HALL2 AKTIV - Voll-Schwelle erreicht (Feed -{(printer["gcode_macro _FILAMENT_VARS"].sync_modulation * 100)|int}%)
        _APPLY_SYNC_STATE
    {% endif %}

# HALL1 - Ueberlast-Notanschlag (ganz oben). Safety-Override:
# laeuft auch waehrend Initial-Lockout durch (TPU-Stau-Schutz).
[gcode_button buffer_hall1]
pin: ^!LLL_PLUS:PB2
press_gcode:
    M118 HALL1 FREI - Ueberlast-Zone verlassen, Sperre aufgehoben
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=overfill_lock VALUE=0
    _APPLY_SYNC_STATE
release_gcode:
    M118 HALL1 AKTIV - UEBERLAST-NOTANSCHLAG! Feeder entkoppelt+disabled
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=overfill_lock VALUE=1
    _ABORT_ALL_FEED_LOOPS
    _APPLY_SYNC_STATE

#####################################################################
#              Entrance-Sensor
#####################################################################

# Filament-Eingang - aktiviert/deaktiviert das Automatik-System
[filament_switch_sensor buffer_entrance]
switch_pin: ^!LLL_PLUS:PB7
pause_on_runout: False
insert_gcode:
    M118 Buffer: Filament erkannt - Grip-Phase startet
    _PREPARE_INITIAL_FILL
runout_gcode:
    {% set v   = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set ref = printer.print_stats.filament_used | float %}
    M118 Buffer: Filament-Runout am Eingang erkannt
    # sync_locked=1: _APPLY_SYNC_STATE macht nichts, Hall-Events haben
    # keinen Einfluss mehr. Feeder laeuft synchron mit dem Extruder
    # weiter (durch bestehenden SYNC_EXTRUDER_MOTION-Zustand), bis der
    # Polling-Loop _runout_stepper_disable ihn nach 100 mm deaktiviert.
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_locked VALUE=1
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=overfill_lock VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_lockout VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_follow_active VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_state VALUE=0
    UPDATE_DELAYED_GCODE ID=_initial_follow_loop DURATION=0
    {% if v.runout_pause == 1 %}
        # Kein externer Sensor: sofort pausieren und Feeder abschalten
        M118 Buffer Runout: Druck pausiert, Feeder abgeschaltet
        {% if v.display_status_enabled == 1 %}
            M117 Runout - Filament pruefen!
        {% endif %}
        SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=
        SET_STEPPER_ENABLE STEPPER="extruder_stepper mellow" ENABLE=0
        {% if printer["gcode_macro _BUFFER_AUTO_CONTROL"].print_running == 1 %}
            PAUSE
        {% endif %}
    {% else %}
        # Externer Runout-Sensor uebernimmt Pause. Feeder laeuft noch
        # 100 mm synchron weiter, dann schaltet _runout_stepper_disable
        # den Stepper ab (nicht den Druck).
        SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=runout_filament_ref VALUE={ref}
        M118 Buffer Runout: Feeder laeuft noch bis {ref + 100} mm extrudiert sind (aktuell {ref} mm)
        {% if v.display_status_enabled == 1 %}
            M117 Runout erkannt...
        {% endif %}
        UPDATE_DELAYED_GCODE ID=_runout_stepper_disable DURATION=1
    {% endif %}

#####################################################################
#              User-Facing Makros
#####################################################################

[gcode_macro ENABLE_RUNOUT_SENSOR]
description: Aktiviert das Pausieren bei Filament-Runout (in PRINT_START nutzen)
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=print_running VALUE=1

[gcode_macro DISABLE_RUNOUT_SENSOR]
description: Deaktiviert das Pausieren bei Filament-Runout (in PRINT_END nutzen)
gcode:
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=print_running VALUE=0

[gcode_macro FORCE_BUFFER_FILL]
description: Startet die Buffer-Erstbefuellung manuell (Grip + Follow)
gcode:
    {% if printer["filament_switch_sensor buffer_entrance"].filament_detected %}
        M118 FORCE_BUFFER_FILL: Erstbefuellung manuell gestartet (Grip + Follow)
        _PREPARE_INITIAL_FILL
    {% else %}
        {action_respond_info("FORCE_BUFFER_FILL abgebrochen: buffer_entrance meldet kein Filament")}
    {% endif %}

[gcode_macro STOP_BUFFER_FILL]
description: Stoppt Dauerlauf UND Initial-Grip/Follow sofort, raeumt Flags auf
gcode:
    M118 STOP_BUFFER_FILL: Alle Foerder-Loops gestoppt
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
    _ABORT_ALL_FEED_LOOPS
    _APPLY_SYNC_STATE

[gcode_macro BUFFER_AUTO_ON]
description: Aktiviert Sync-Automatik sofort (ohne Grip/Follow-Phase)
gcode:
    M118 BUFFER_AUTO_ON: Sync-Automatik ohne Initial-Phase scharf geschaltet
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=system_enabled VALUE=1
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=overfill_lock VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_lockout VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_follow_active VALUE=0
    UPDATE_DELAYED_GCODE ID=_initial_follow_loop DURATION=0
    UPDATE_DELAYED_GCODE ID=_initial_follow_end DURATION=0
    _APPLY_SYNC_STATE

#####################################################################
#              Kalibrierung: Lade-Distanz + Feeder-Sync
#####################################################################

# State-Container fuer die Mess-Modus-Kalibrierung via Feed-Taster.
# Nutzung:
#   1. MEASURE_LOAD_START aufrufen -> active=1, distance=0, Feeder-Sync getrennt
#   2. Vorschub-Taster 1x druecken -> Dauer-Foerderung startet, _MANUAL_FEED
#      inkrementiert bei jedem Chunk die distance-Variable hier
#   3. Vorschub-Taster 2x druecken (Toggle) -> Foerderung stoppt,
#      MEASURE_LOAD_STOP wird aufgerufen und gibt die gemessene Distanz aus
[gcode_macro _MEASURE_LOAD_STATE]
variable_active: 0
variable_distance: 0
gcode:

[gcode_macro MEASURE_LOAD_START]
description: Startet die Messung der Lade-Distanz via Vorschub-Taster (Toggle)
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    SET_GCODE_VARIABLE MACRO=_MEASURE_LOAD_STATE VARIABLE=active VALUE=1
    SET_GCODE_VARIABLE MACRO=_MEASURE_LOAD_STATE VARIABLE=distance VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
    _SYNC_OFF
    M118 MESSUNG GESTARTET: Vorschub-Taster 1x druecken zum Starten, nochmals zum Stoppen
    {% if v.display_status_enabled == 1 %}
        M117 Messen: Taster druecken...
    {% endif %}

[gcode_macro MEASURE_LOAD_STOP]
description: Stoppt die Messung und gibt die gemessene Lade-Distanz aus
gcode:
    {% set v    = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set dist = printer["gcode_macro _MEASURE_LOAD_STATE"].distance %}
    SET_GCODE_VARIABLE MACRO=_MEASURE_LOAD_STATE VARIABLE=active VALUE=0
    SET_GCODE_VARIABLE MACRO=_MANUAL_FEED VARIABLE=active VALUE=0
    UPDATE_DELAYED_GCODE ID=_manual_feed_loop DURATION=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
    _APPLY_SYNC_STATE
    M118 =====================================================
    M118 MESSUNG ABGESCHLOSSEN: {dist} mm
    M118 Bitte in _FILAMENT_VARS eintragen:
    M118   variable_load_fast_distance: {dist}
    M118 =====================================================
    {% if v.display_status_enabled == 1 %}
        M117 Gemessen: {dist} mm
    {% endif %}

[gcode_macro CALIBRATE_FEEDER_SYNC]
description: Setzt Feeder auf nominale rotation_distance fuer Kalibrierung (ohne Modulation)
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=extruder
    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={v.sync_rotation_distance}
    M118 KALIBRIERUNG: Feeder laeuft jetzt 1:1 mit Extruder (nominal {v.sync_rotation_distance} mm)
    M118 Jetzt: G1 E100 F60 ausfuehren, am Feeder nachmessen, Wert anpassen
    M118 Formel: neue_dist = {v.sync_rotation_distance} * (gemessene_mm / 100)
    {% if v.display_status_enabled == 1 %}
        M117 Kalibrierung aktiv...
    {% endif %}

[gcode_macro _STATE_DUMP]
description: Zeigt alle Buffer-Flags und Sensor-Zustaende (Diagnose)
gcode:
    {% set b = printer["gcode_macro _BUFFER_AUTO_CONTROL"] %}
    {% set t = printer["gcode_macro _TRIPLE_CLICK_STATE"] %}
    {% set s = printer["filament_switch_sensor buffer_entrance"] %}
    {% set h1 = printer["gcode_button buffer_hall1"].state %}
    {% set h2 = printer["gcode_button buffer_hall2"].state %}
    {% set h3 = printer["gcode_button buffer_hall3"].state %}
    M118 ---- BUFFER STATE ----
    M118 system_enabled     = {b.system_enabled}
    M118 manual_operation   = {b.manual_operation}
    M118 overfill_lock      = {b.overfill_lock}
    M118 initial_lockout    = {b.initial_lockout}
    M118 initial_follow_act = {b.initial_follow_active}
    M118 print_running      = {b.print_running}
    M118 saved_e_abs        = {b.saved_e_abs}
    M118 feed_count         = {t.feed_count}
    M118 retract_count      = {t.retract_count}
    M118 buffer_entrance    = {s.filament_detected}
    M118 HALL1 raw={h1} aktiv={'JA' if h1 == 'RELEASED' else 'nein'}
    M118 HALL2 raw={h2} aktiv={'JA' if h2 == 'RELEASED' else 'nein'}
    M118 HALL3 raw={h3} aktiv={'JA' if h3 == 'RELEASED' else 'nein'}
    M118 ---- END STATE ----

#####################################################################
#              Boot-Autostart
#####################################################################

# Boot-Autostart. Pruefung:
#   - buffer_entrance belegt?  -> nein: Standby
#   - HALL2 oder HALL1 AKTIV?  -> ja: Buffer schon voll -> nur Sync an,
#                                  KEINE Initial-Phase (TPU-Wickler-Schutz)
#   - HALL3 AKTIV oder frei?   -> Grip + Follow starten
# 7s Delay, damit Klipper die Hall-States sauber eingelesen hat.
[delayed_gcode _boot_autostart]
initial_duration: 7.0
gcode:
    {% if printer["filament_switch_sensor buffer_entrance"].filament_detected %}
        {% set hall1 = printer["gcode_button buffer_hall1"].state %}
        {% set hall2 = printer["gcode_button buffer_hall2"].state %}
        # Annahme: state "RELEASED" == AKTIV (Sensor invertiert, siehe Header)
        {% if hall1 == "RELEASED" or hall2 == "RELEASED" %}
            M118 BOOT: Buffer bereits voll (HALL1={hall1} HALL2={hall2}) - Sync an, keine Initial-Phase
            BUFFER_AUTO_ON
        {% else %}
            M118 BOOT: Filament am Eingang, Buffer nicht voll - Erstbefuellung
            FORCE_BUFFER_FILL
        {% endif %}
    {% else %}
        M118 BOOT: Kein Filament am Eingang - Automatik im Standby
    {% endif %}

# Polling-Loop: prueft ob seit dem Runout-Event 100 mm extrudiert
# wurden. Sobald filament_used >= Referenz + 100, wird der Feeder-
# Stepper abgeschaltet. Der Drucker kann ungestoert weiterdrucken
# bzw. pausiert durch den externen Sensor - der Feeder laeuft einfach
# leer und wird dann sicher abgeklemmt.
[delayed_gcode _runout_stepper_disable]
gcode:
    {% set b   = printer["gcode_macro _BUFFER_AUTO_CONTROL"] %}
    {% set v   = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set ref = b.runout_filament_ref | float %}
    {% set cur = printer.print_stats.filament_used | float %}
    {% if cur >= ref + 100 %}
        M118 Buffer Runout: 100 mm extrudiert - Feeder-Stepper wird deaktiviert
        {% if v.display_status_enabled == 1 %}
            M117 Feeder deaktiviert
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_locked VALUE=0
        SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=system_enabled VALUE=0
        SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
        SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=
        SET_STEPPER_ENABLE STEPPER="extruder_stepper mellow" ENABLE=0
    {% else %}
        M118 Buffer Runout: warte auf 100 mm... ({(cur - ref)|round(1)} / 100 mm)
        UPDATE_DELAYED_GCODE ID=_runout_stepper_disable DURATION=1
    {% endif %}

#####################################################################
#              Initial-Befuellung: Grip + Follow
#####################################################################
# Laeuft IMMER ausserhalb des Drucks (insert_gcode, FORCE_BUFFER_FILL,
# _boot_autostart). FORCE_MOVE ist hier unkritisch, weil kein Druck
# laeuft. Sync ist waehrend Grip/Follow AUS (initial_lockout=1 ->
# _APPLY_SYNC_STATE entkoppelt).

[gcode_macro _INITIAL_GRIP_PHASE]
gcode:
    {% set v        = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set distance = (v.initial_grip_speed * v.initial_grip_duration) | int %}
    M118 Grip-Phase: {distance} mm @ {v.initial_grip_speed} mm/s
    _SYNC_OFF
    FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE={distance} VELOCITY={v.initial_grip_speed} ACCEL={v.force_move_accel}
    M118 Grip abgeschlossen - Follow-Phase startet ({v.initial_follow_duration}s @ {v.initial_follow_speed} mm/s)
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_follow_active VALUE=1
    UPDATE_DELAYED_GCODE ID=_initial_follow_loop DURATION=0
    UPDATE_DELAYED_GCODE ID=_initial_follow_end  DURATION={v.initial_follow_duration}

[delayed_gcode _start_initial_grip]
gcode:
    _INITIAL_GRIP_PHASE

[delayed_gcode _initial_follow_loop]
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    {% if printer["gcode_macro _BUFFER_AUTO_CONTROL"].initial_follow_active == 1 %}
        FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE={v.manual_chunk_distance} VELOCITY={v.initial_follow_speed} ACCEL={v.force_move_accel}
        {% set loop_delay = ((v.manual_chunk_distance / v.initial_follow_speed) + 0.05) | round(2) %}
        UPDATE_DELAYED_GCODE ID=_initial_follow_loop DURATION={loop_delay}
    {% endif %}

[delayed_gcode _initial_follow_end]
gcode:
    M118 Follow-Phase beendet - Initial-Lockout aufgehoben, Sync wird aktiviert
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_follow_active VALUE=0
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=initial_lockout VALUE=0
    _APPLY_SYNC_STATE

#####################################################################
#              LOAD / UNLOAD
#####################################################################
#
# Voraussetzungen in printer.cfg:
#   [force_move]
#   enable_force_move: True
#
#   [extruder]
#   max_extrude_only_distance: 250     # >= load_slow / unload_sync
#
# LOAD:
#   Phase 1: FORCE_MOVE (nur Feeder), SYNC aus, schnell
#   Phase 2: SYNC an, nominal rot_dist, G1 E -> Feeder+Extruder parallel
#   Phase 3: FORCE_MOVE (nur Feeder), SYNC aus, schnell
#
# UNLOAD:
#   Phase 1: Tip-Forming via G1 E (Extruder) mit aktiver Sync
#            -> Feeder laeuft 1:1 mit, keine separate Queue
#   Phase 2: G1 E- mit aktiver Sync, schnell zurueck
#   Phase 3: FORCE_MOVE Feeder bis buffer_entrance frei, SYNC aus

[gcode_macro LOAD_FILAMENT]
description: Filament laden (sensorgesteuert via HALL2, Phase 2 via Extruder-Sync)
variable_state: 0
variable_distance: 0
gcode:
    {% set v    = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set temp = printer.extruder.temperature %}
    {% if temp < v.min_temp %}
        {action_raise_error("LADEN abgebrochen: Hotend zu kalt ({:.0f}/{:.0f} C)".format(temp|float, v.min_temp|float))}
    {% endif %}
    _SAVE_E_MODE
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1
    _SYNC_OFF
    M118 LADEN Phase 1: Feeder foerdert {v.load_fast_distance} mm @ {v.fast_speed} mm/s (Weg zum Toolhead)
    {% if v.display_status_enabled == 1 %}
        M117 Laden Phase 1...
    {% endif %}
    SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=state VALUE=1
    SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=distance VALUE=0
    _LOAD_PH_ONE_LOOP

# LOAD-Phase 1: Feeder allein foerdert in manual_chunk_distance-Schritten
# bis v.load_fast_distance erreicht ist. Kein Sensor-Check - Distanz ist
# per MEASURE_LOAD vorher kalibriert.
[gcode_macro _LOAD_PH_ONE_LOOP]
gcode:
    {% set v        = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set state    = printer["gcode_macro LOAD_FILAMENT"].state %}
    {% set distance = printer["gcode_macro LOAD_FILAMENT"].distance %}
    {% set step     = v.manual_chunk_distance %}
    {% set delay    = ((step / v.fast_speed) + 0.05) | round(2) %}
    {% if state == 1 %}
        {% if distance >= v.load_fast_distance %}
            M118 LADEN Phase 1: {distance} mm gefoerdert - starte Phase 2
            {% if v.display_status_enabled == 1 %}
                M117 Laden Phase 2...
            {% endif %}
            _LOAD_PH_TWO
        {% else %}
            FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE={step} VELOCITY={v.fast_speed} ACCEL={v.force_move_accel}
            SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=distance VALUE={distance + step}
            UPDATE_DELAYED_GCODE ID=_load_ph_one_delayed DURATION={delay}
        {% endif %}
    {% endif %}

[delayed_gcode _load_ph_one_delayed]
gcode:
    _LOAD_PH_ONE_LOOP

# LOAD-Phase 2: Feeder + Extruder synchron langsam durch Hotend.
# sync_locked=1 sperrt _APPLY_SYNC_STATE gegen Hall-Trigger, Sync
# laeuft exakt auf nominaler rotation_distance. Distanz in 50-mm-Chunks,
# um max_extrude_only_distance in der Hauptconfig zu respektieren.
[gcode_macro _LOAD_PH_TWO]
gcode:
    {% set v = printer["gcode_macro _FILAMENT_VARS"] %}
    M118 LADEN Phase 2: {v.load_slow} mm @ {v.slow_speed} mm/s (Sync 1:1 - Hotend-Durchfahrt)
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_locked VALUE=1
    SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=extruder
    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={v.sync_rotation_distance}
    {% set chunk     = 50 %}
    {% set full      = (v.load_slow // chunk) | int %}
    {% set remainder = v.load_slow - (full * chunk) %}
    {% for i in range(full) %}
        G1 E{chunk} F{(v.slow_speed * 60)|int}
    {% endfor %}
    {% if remainder > 0 %}
        G1 E{remainder} F{(v.slow_speed * 60)|int}
    {% endif %}
    M400
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_locked VALUE=0
    _SYNC_OFF
    M118 LADEN Phase 3: Buffer befuellen bis HALL2 (max {v.load_buffer_max} mm @ {v.fast_speed} mm/s)
    {% if v.display_status_enabled == 1 %}
        M117 Laden Phase 3...
    {% endif %}
    SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=state VALUE=3
    SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=distance VALUE=0
    _LOAD_PH_THREE_LOOP

# LOAD-Phase 3: Feeder allein foerdert bis HALL2 triggert oder
# v.load_buffer_max erreicht (Timeout). HALL2 wird direkt aus Raw-State
# abgefragt - ^!-Invertierung: state == "RELEASED" heisst Sensor aktiv.
[gcode_macro _LOAD_PH_THREE_LOOP]
gcode:
    {% set v        = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set state    = printer["gcode_macro LOAD_FILAMENT"].state %}
    {% set distance = printer["gcode_macro LOAD_FILAMENT"].distance %}
    {% set step     = v.manual_chunk_distance %}
    {% set delay    = ((step / v.fast_speed) + 0.05) | round(2) %}
    {% set hall2_active = printer["gcode_button buffer_hall2"].state == "RELEASED" %}
    {% if state == 3 %}
        {% if hall2_active %}
            M118 LADEN Phase 3: Buffer voll (HALL2) nach {distance} mm - Laden abgeschlossen
            {% if v.display_status_enabled == 1 %}
                M117 Laden abgeschlossen
            {% endif %}
            SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=state VALUE=0
            _RESTORE_E_MODE
            SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
            _APPLY_SYNC_STATE
        {% elif distance >= v.load_buffer_max %}
            M118 LADEN abgeschlossen (Warnung: HALL2 nicht erreicht nach {distance} mm - Buffer-Timeout)
            {% if v.display_status_enabled == 1 %}
                M117 Laden OK (Warn)
            {% endif %}
            SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=state VALUE=0
            _RESTORE_E_MODE
            SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
            _APPLY_SYNC_STATE
        {% else %}
            FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE={step} VELOCITY={v.fast_speed} ACCEL={v.force_move_accel}
            SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=distance VALUE={distance + step}
            UPDATE_DELAYED_GCODE ID=_load_ph_three_delayed DURATION={delay}
        {% endif %}
    {% endif %}

[delayed_gcode _load_ph_three_delayed]
gcode:
    _LOAD_PH_THREE_LOOP

[gcode_macro UNLOAD_FILAMENT]
description: Filament entladen (Tip-Forming + Sync-Retract + Feeder-Rueckzug)
variable_state: 'idle'
variable_retracted: 0
gcode:
    {% set v    = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set temp = printer.extruder.temperature %}
    {% if temp < v.min_temp %}
        {action_raise_error("ENTLADEN abgebrochen: Hotend zu kalt ({:.0f}/{:.0f} C)".format(temp|float, v.min_temp|float))}
    {% endif %}
    _SAVE_E_MODE
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=1

    # Phase 1: Tip-Forming - Sync gesperrt, nominale rotation_distance,
    # Extruder + Feeder bewegen sich synchron.
    M118 ENTLADEN Phase 1: Tip-Forming ({v.tip_cycles} Zyklen @ {v.tip_speed} mm/s)
    {% if v.display_status_enabled == 1 %}
        M117 Entladen Phase 1...
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_locked VALUE=1
    SYNC_EXTRUDER_MOTION EXTRUDER=mellow MOTION_QUEUE=extruder
    SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=mellow DISTANCE={v.sync_rotation_distance}
    {% for i in range(v.tip_cycles) %}
        G1 E{v.tip_push} F{(v.tip_speed * 60)|int}
        G1 E-{v.tip_pull} F{(v.tip_speed * 60)|int}
    {% endfor %}
    G1 E-{v.tip_final_retract} F{(v.tip_final_speed * 60)|int}
    M400
    M118 ENTLADEN Phase 1: Tip-Forming abgeschlossen
    {% if v.display_status_enabled == 1 %}
        M117 Tip-Forming OK
    {% endif %}

    # Phase 2: Sync-Retract in 50-mm-Chunks (max_extrude_only_distance-safe).
    M118 ENTLADEN Phase 2: {v.unload_sync} mm @ {v.slow_speed} mm/s (Sync-Retract)
    {% if v.display_status_enabled == 1 %}
        M117 Entladen Phase 2...
    {% endif %}
    {% set chunk     = 50 %}
    {% set full      = (v.unload_sync // chunk) | int %}
    {% set remainder = v.unload_sync - (full * chunk) %}
    {% for i in range(full) %}
        G1 E-{chunk} F{(v.slow_speed * 60)|int}
    {% endfor %}
    {% if remainder > 0 %}
        G1 E-{remainder} F{(v.slow_speed * 60)|int}
    {% endif %}
    M400
    M118 ENTLADEN Phase 2: Sync-Retract abgeschlossen
    {% if v.display_status_enabled == 1 %}
        M117 Sync-Retract OK
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_locked VALUE=0
    _SYNC_OFF

    # Phase 3a: Bekannter Weg Toolhead -> Feeder am Stueck
    M118 ENTLADEN Phase 3a: {v.load_fast_distance} mm Schnellrueckzug @ {v.fast_speed} mm/s
    {% if v.display_status_enabled == 1 %}
        M117 Entladen Phase 3a...
    {% endif %}
    FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE=-{v.load_fast_distance} VELOCITY={v.fast_speed} ACCEL={v.force_move_accel}

    # Phase 3b: Polling-Loop zieht weiter bis buffer_entrance frei
    M118 ENTLADEN Phase 3b: Polling bis buffer_entrance frei (max {v.unload_fast_max} mm gesamt)
    {% if v.display_status_enabled == 1 %}
        M117 Entladen Phase 3b...
    {% endif %}
    SET_GCODE_VARIABLE MACRO=UNLOAD_FILAMENT VARIABLE=state VALUE='fast_retract'
    SET_GCODE_VARIABLE MACRO=UNLOAD_FILAMENT VARIABLE=retracted VALUE={v.load_fast_distance}
    _UNLOAD_FAST_RETRACT

[gcode_macro _UNLOAD_FAST_RETRACT]
# Polling-Loop Phase 3b. Zieht den Feeder in 50-mm-Schritten zurueck
# bis buffer_entrance kein Filament mehr meldet oder der Timeout
# v.unload_fast_max erreicht ist. Startet mit bereits zurueckgezogener
# v.load_fast_distance als Counter-Basis (aus Phase 3a).
# chunk=50 ist hardcoded (bewusst nicht v.manual_chunk_distance), weil
# es dem max_extrude_only_distance-Safe-Wert entspricht und konsistent
# zu LOAD-Phase-2 / UNLOAD-Phase-2 ist.
gcode:
    {% set v         = printer["gcode_macro _FILAMENT_VARS"] %}
    {% set state     = printer["gcode_macro UNLOAD_FILAMENT"].state %}
    {% set entrance  = printer["filament_switch_sensor buffer_entrance"].filament_detected %}
    {% set retracted = printer["gcode_macro UNLOAD_FILAMENT"].retracted %}
    {% set chunk     = 50 %}
    {% set loop_delay = ((chunk / v.fast_speed) + 0.1) | round(2) %}

    {% if state == 'fast_retract' %}
        {% if entrance and retracted < v.unload_fast_max %}
            FORCE_MOVE STEPPER="extruder_stepper mellow" DISTANCE=-{chunk} VELOCITY={v.fast_speed} ACCEL={v.force_move_accel}
            SET_GCODE_VARIABLE MACRO=UNLOAD_FILAMENT VARIABLE=retracted VALUE={retracted + chunk}
            UPDATE_DELAYED_GCODE ID=_unload_fast_delayed DURATION={loop_delay}
        {% else %}
            SET_GCODE_VARIABLE MACRO=UNLOAD_FILAMENT VARIABLE=state VALUE='idle'
            _RESTORE_E_MODE
            SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=system_enabled VALUE=0
            SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=manual_operation VALUE=0
            SET_GCODE_VARIABLE MACRO=_BUFFER_AUTO_CONTROL VARIABLE=sync_state VALUE=0
            _APPLY_SYNC_STATE
            {% if not entrance %}
                M118 ENTLADEN abgeschlossen - buffer_entrance frei nach {retracted} mm gesamt
                {% if v.display_status_enabled == 1 %}
                    M117 Entladen abgeschlossen
                {% endif %}
            {% else %}
                M118 ENTLADEN-WARNUNG: Timeout {v.unload_fast_max} mm erreicht - bitte pruefen
                {% if v.display_status_enabled == 1 %}
                    M117 WARNUNG: Entlade-Timeout
                {% endif %}
            {% endif %}
        {% endif %}
    {% endif %}

[delayed_gcode _unload_fast_delayed]
gcode:
    _UNLOAD_FAST_RETRACT
